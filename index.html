<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华南理工校园百事通</title>
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            padding: 0;
            background: #2a2a2a;
            color: #e0e0e0;
            overflow: hidden;
        }

        .chat-container {
            width: 100vw;
            height: 100vh;
            background: #1e1e1e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            transition: left 0.3s ease, width 0.3s ease;
        }

        .chat-header {
            height:72px;
            padding: 16px 20px;
            background: #1e1e1e;
            border-bottom: 1px solid #444;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .chat-header > span {
            position:absolute;
            left:50%;
            transform:translateX(-50%);
        }

        .user-info {
            position:absolute;
            right:16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .health-status {
            font-size: 14px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
        }

        .chat-messages {
            flex: 1;
            width: min(92%, 860px);
            margin: 0 auto;
            padding: 20px 16px 120px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;

            /* Firefox：默认细滚动条，不彻底隐藏 */
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
        }

        /* Firefox：鼠标悬停或滚动时显示 */
        .chat-messages:hover,
        .chat-messages.scrolling{
            scrollbar-color: #555 transparent;
        }

        /* Chrome / Edge / Safari */
        .chat-messages::-webkit-scrollbar{
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track{
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb{
            background: rgba(85,85,85,0);
            border-radius: 3px;
        }

        /* 鼠标放到对话区域时显示 */
        .chat-messages:hover::-webkit-scrollbar-thumb{
            background: #555;
        }

        /* 正在滚动时显示 */
        .chat-messages.scrolling::-webkit-scrollbar-thumb{
            background: #555;
        }

        .message {
            max-width: 85%;
            display: flex;
        }

        .ai-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .ai-message .bubble {
            background: #f1f3f4;
            color: #e0e0e0;
            border-bottom-left-radius: 6px;
        }

        .user-message .bubble {
            background: #3a3a3a;
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .greeting-text{
            position:absolute;
            left:50%;
            top:calc(50% - 130px);
            transform:translateX(-50%);
            width:min(92%, 780px);
            text-align:center;
            color:#f0f0f0;
            font-size:24px;
            font-weight:700;
            line-height:1.4;
            z-index:5;
            pointer-events:none;
        }

        .chat-container.chat-active .greeting-text{
            display:none;
        }

        .chat-container:not(.start-mode) .greeting-text{
            display:none;
        }

        .input-area {
            position: absolute;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            width: min(92%, 780px);
            padding: 0;
            border: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
            background: transparent;
            box-shadow: none;
        }

        /* 初始状态：输入框居中 */
        .chat-container.start-mode .input-area{
            top:50%;
            bottom:auto;
            transform:translate(-50%,-50%);
            width:min(92%, 780px);
        }

        .chat-container.chat-active .input-area {
            animation: inputDropDown 0.35s ease forwards;
        }

        @keyframes inputDropDown {
            from {
                top: 50%;
                bottom: auto;
                transform: translate(-50%, -50%);
            }
            to {
                top: auto;
                bottom: 16px;
                transform: translateX(-50%);
            }
        }

        @media (max-width: 600px) {
            @keyframes inputDropDown {
                from {
                    top: 50%;
                    bottom: auto;
                    transform: translate(-50%, -50%);
                }
                to {
                    top: auto;
                    bottom: 10px;
                    transform: translateX(-50%);
                }
            }
        }

        /* 初始状态隐藏消息区 */
        .chat-container.start-mode .chat-messages{
            display:none;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        #question-input {
            width: 100%;
            padding: 20px 100px 60px 18px; 
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 28px;
            resize: none;
            min-height: 140px;
            max-height: min(220px, 50vh);
            outline: none;
            font-size: clamp(14px, 1.6vw, 16px);
            line-height: 1.8;
            transition: border-color 0.2s, box-shadow 0.2s;
            display: block;
        }

        #question-input:focus {
            border-color: #888;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.12);
        }

        .option-buttons {
            position: absolute;
            left: 14px;
            bottom: 14px;
            display: flex;
            gap: 8px;
            justify-content: flex-start;
            z-index: 2;
        }

        .option-btn {
            padding: 7px 12px;
            border-radius: 24px;
            border: 1px solid #555;
            background: #2a2a2a;
            color: #e0e0e0;
            cursor: pointer;
            font-size: clamp(12px, 1.5vw, 13px);
            line-height: 1;
            transition: background 0.2s, border-color 0.2s;
            white-space: nowrap;
        }

        .option-btn.active {
            background: #444;
            border-color: #aaa;
            color: #fff;
        }

        .option-btn:hover {
            border-color: #999;
            background: #3a3a3a;
        }

        .admin-hidden {
            display: none;
        }

        #send-btn {
            position: absolute;
            right: 12px;
            bottom: 14px;
            height: 36px;
            padding: 0 20px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s, transform 0.2s;
        }

        #send-btn:hover {
            background: #f0f0f0;
        }

        #send-btn:disabled {
            background: #bdbdbd;
            color: #555;
            cursor: not-allowed;
        }

        .loading {
            color: #999;
            font-size: 14px;
            padding: 8px 16px;
        }

        /* 顶部自定义提示气泡 */
        .toast-message {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translate(-50%, -12px);
            padding: 10px 18px;
            background: rgba(70, 70, 70, 0.96);
            color: #ffffff;
            font-size: 14px;
            border-radius: 999px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.28);
            opacity: 0;
            pointer-events: none;
            z-index: 3000;
            transition: opacity 0.25s ease, transform 0.25s ease;
            white-space: nowrap;
        }

        .toast-message.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        /* 登录注册弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1f1f1f;
            color: #e0e0e0;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-item {
            margin-bottom: 16px;
        }

        .form-item label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #bdbdbd;
        }

        .form-item input {
            width: 100%;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            background: #3a3a3a;
            color: #e0e0e0;
        }

        .form-item input::placeholder {
            color: #b0b0b0;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .primary-btn {
            background: #555;
            color: #fff;
        }

        .primary-btn:hover {
            background: #666;
        }

        .cancel-btn {
            background: #e6e6e6;
            color: #000;
        }

        .cancel-btn:hover {
            background: #f2f2f2;
        }

        .register-link {
            margin-top: 12px;
            text-align: right;
        }

        .register-link span {
            display: inline-block;
            font-size: 13px;
            color: #999;
            cursor: pointer;
            padding: 2px 4px;
        }

        .register-link span:hover {
            color: #d0d0d0;
        }

        .login-link {
            margin-top: 12px;
            text-align: right;
        }

        .login-link span {
            display: inline-block;
            font-size: 13px;
            color: #999;
            cursor: pointer;
            padding: 2px 4px;
        }

        .login-link span:hover {
            color: #d0d0d0;
        }

        .hidden {
            display: none;
        }

        .error-msg {
            color: #f56c6c;
            font-size: 12px;
            margin-top: 4px;
        }

        .history-btn {
            padding: 4px 8px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
        }

        /* 左上角菜单按钮 */
        .sidebar-toggle{
            position:fixed;
            left:0;
            top:0;
            width:64px;
            height:72px;
            border:none;
            border-bottom:1px solid #444;
            background: #1e1e1e;
            color: #fff;
            font-size:24px;
            cursor:pointer;
            z-index:300;
            transition:left 0.3s ease;
        }

        body.sidebar-open .sidebar-toggle{
            left:260px;
        }

        /* 左侧折叠栏：默认隐藏 */
        .sidebar{
            position:fixed;
            left:-260px;
            top:0; 
            width:260px;
            height:100vh;
            background: #1f1f1f;
            color: #e0e0e0;
            border-right:1px solid #444;
            transition:left 0.3s ease, box-shadow 0.3s ease;
            z-index:200;
            padding:100px 12px 12px 12px;
            overflow-y:hidden;
            box-shadow:none;
        }

        /* 展开时显示 */
        .sidebar.open{
            left:0;
            box-shadow: 6px 0 18px rgba(0,0,0,0.28);
        }

        /* 左侧折叠栏左上角 Logo */
        .sidebar-brand{
            position: absolute;
            top: 6px;
            left: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-height: 58px;
            padding: 6px 8px;
            background: #1f1f1f;
            border-radius: 10px;
            z-index: 1;
        }

        .sidebar-brand img{
            display: block;
            height: 60px; 
            width: auto;
            max-width: 190px;
            object-fit: contain;
            border: none;
            filter:
                brightness(1.18)
                contrast(1.22)
                drop-shadow(0 0 1px rgba(255,255,255,0.55))
                drop-shadow(0 2px 8px rgba(255,255,255,0.08));
        }

        .sidebar-content{
            height:100%;
            padding:0 8px 82px 0;
            overflow:hidden;
            display:flex;
            flex-direction:column;
        }

        /* 默认隐藏滚动条 */
        .sidebar-content::-webkit-scrollbar{
            width:6px;
            opacity:0;
            transition: opacity 0.3s;
        }

        /* 鼠标悬停或滚动时显示滚动条 */
        .sidebar-content:hover::-webkit-scrollbar,
        .sidebar-content:active::-webkit-scrollbar{
            opacity:1;
        }

        .sidebar-content::-webkit-scrollbar-track{
            background:transparent;
        }

        .sidebar-content::-webkit-scrollbar-thumb{
            background:#555;
            border-radius:3px;
        }

        /* 左侧折叠栏底部用户区域 */
        .sidebar-user-area{
            position:absolute;
            left:0;
            bottom:0;
            width:100%;
            height:72px;
            border-top:1px solid #444;
            background:#1f1f1f;
            padding:10px 12px;
            z-index:20;
        }

        /* 用户按钮整体 */
        .sidebar-user-btn{
            width:100%;
            height:52px;
            border:none;
            background:transparent;
            color:#e0e0e0;
            border-radius:10px;
            display:flex;
            align-items:center;
            gap:10px;
            padding:0 10px;
            cursor:pointer;
            text-align:left;
        }

        .sidebar-user-btn:hover{
            background:#2a2a2a;
        }

        /* 圆形头像 */
        .sidebar-user-avatar{
            width:34px;
            height:34px;
            border-radius:50%;
            background:#3a3a3a;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:15px;
            font-weight:700;
            flex-shrink:0;
        }

        /* 用户名 */
        .sidebar-user-name{
            flex:1;
            font-size:14px;
            color:#f0f0f0;
            overflow:hidden;
            white-space:nowrap;
            text-overflow:ellipsis;
        }

        /* 用户菜单 */
        .sidebar-user-menu{
            position:absolute;
            left:12px;
            bottom:70px;
            width:140px;
            padding:6px;
            background:#2f2f2f;
            border:1px solid #444;
            border-radius:10px;
            box-shadow:0 8px 24px rgba(0,0,0,0.35);
            z-index:700;
        }

        .sidebar-user-menu-item{
            width:100%;
            padding:9px 10px;
            border:none;
            border-radius:8px;
            background:transparent;
            color:#e0e0e0;
            font-size:14px;
            text-align:left;
            cursor:pointer;
        }

        .sidebar-user-menu-item:hover{
            background:#444;
        }

        .sidebar-user-menu-item.danger {
            color: #ff4d4f; 
        }
        .sidebar-user-menu-item.danger:hover {
            background: rgba(255, 77, 79, 0.15);
        }

        /* 个人信息页面 */
        .profile-page{
            flex:1;
            background:#1e1e1e;
            color:#e0e0e0;
            display:none;
            justify-content:center;
            align-items:center;
            padding:24px;
        }

        .profile-card{
            width:min(92%, 420px);
            background:#242424;
            border:1px solid #444;
            border-radius:18px;
            padding:28px 24px;
            text-align:center;
        }

        .profile-avatar{
            width:76px;
            height:76px;
            border-radius:50%;
            background:#3a3a3a;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:30px;
            font-weight:800;
            margin:0 auto 16px auto;
        }

        .profile-name{
            font-size:20px;
            font-weight:700;
            margin-bottom:10px;
        }

        .profile-info{
            font-size:14px;
            color:#bdbdbd;
            line-height:1.8;
        }

        .new-chat-card{
            padding:14px;
            border:1px solid #444;
            border-radius:8px;
            cursor:pointer;
            margin-bottom:10px;
            background:#2a2a2a;
            color:#e0e0e0;
            flex-shrink:0;
        }

        .new-chat-card:hover{
            background: #3b3b3b;
        }

        .history-label{
            font-size:13px;
            color:#999;
            margin:6px 0 4px 4px;
            flex-shrink:0;
        }

        .history-scroll-area{
            flex:1;
            overflow-y:auto;
            padding-right:0;
        }

        .history-scroll-area::-webkit-scrollbar{
            width:6px;
        }

        .history-scroll-area::-webkit-scrollbar-track{
            background:transparent;
        }

        .history-scroll-area::-webkit-scrollbar-thumb{
            background:#555;
            border-radius:3px;
        }

        .history-records{
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .history-record{
            position: relative;
            padding:12px 42px 12px 12px;
            background:transparent;
            border:none;
            color:#e0e0e0;
            border-radius:8px;
            cursor:pointer;
            overflow: visible;
            display:flex;
            align-items:center;
            min-height:48px;
        }

        /* 历史记录标题文字 */
        .history-record-title{
            flex: 1;
            overflow:hidden;
            white-space:nowrap;
            text-overflow:ellipsis;
        }

        /* 鼠标放到历史记录上时，背景提亮 */
        .history-record:hover{
            background: #3b3b3b;
        }

        /* 当前选中的历史记录：提亮灰色 */
        .history-record.selected {
            background: #3f3f3f;
            border-color: #555;
            color: #fff;
        }

        /* 选中状态下 hover：继续保持灰色提亮 */
        .history-record.selected:hover {
            background: #4a4a4a;
            border-color: #666;
        }
        /* 历史记录右侧三个点按钮 */
        .history-more-btn{
            position:absolute;
            right:8px;
            top:50%;
            transform:translateY(-50%);
            width:26px;
            height:26px;
            border:none;
            border-radius:6px;
            background: transparent;
            color:#d0d0d0;
            cursor:pointer;
            font-size:18px;
            line-height:26px;
            opacity:0;
            transition: background 0.2s, opacity 0.2s;
        }

        /* 鼠标放到历史记录上时显示右侧按钮 */
        .history-record:hover .history-more-btn{
            opacity:1;
        }

        /* 鼠标放到右侧按钮上时，按钮提亮 */
        .history-more-btn:hover{
            background: rgba(255,255,255,0.15);
        }

        /* 当前打开菜单时，让三个点按钮保持显示 */
        .history-record.menu-open .history-more-btn{
            opacity:1;
            background: rgba(255,255,255,0.15);
        }

        /* 历史记录操作菜单 */
        .history-menu{
            position:absolute;
            right:8px;
            top:42px;
            width:118px;
            padding:6px;
            background:#2f2f2f;
            border:1px solid #444;
            border-radius:10px;
            box-shadow:0 8px 24px rgba(0,0,0,0.35);
            z-index:600;
        }

        /* 菜单里的按钮 */
        .history-menu-item{
            width:100%;
            padding:9px 10px;
            border:none;
            border-radius:8px;
            background:transparent;
            color:#e0e0e0;
            font-size:14px;
            text-align:left;
            cursor:pointer;
        }

        /* 菜单按钮 hover */
        .history-menu-item:hover{
            background:#444;
        }

        /* 删除按钮红色 */
        .history-menu-item.danger{
            color:#ff6b6b;
        }

        .history-menu-item.danger:hover{
            background:rgba(255,80,80,0.15);
        }

        /* 主页面默认占满整个窗口 */
        .chat-container{
            left:0;
            width:100vw;
        }

        /* 
        当侧边栏展开且窗口宽度足够时：
        主对话区向右移动一个侧边栏宽度，并缩小宽度，避免被挤出屏幕
        */
        body.sidebar-open.sidebar-push .chat-container{
            left:260px;
            width:calc(100vw - 260px);
        }

        /* 
        标题始终相对于当前 chat-container 居中。
        max-width 防止标题和右侧登录/状态按钮重叠。
        */
        .chat-header > span {
            max-width: calc(100% - 260px);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        /* 隐藏AI回答气泡背景 */
        .ai-message .bubble.no-bg {
            background: none;
            border-radius: 0;
            padding: 0;
            color: #e0e0e0;
        }

        .ai-message .bubble.no-bg .markdown {
            font-size: 15px;
            line-height: 1.75;
            margin-bottom: 4px;
            word-break: break-word;
        }

        /* 一级标题 */
        .ai-message .bubble.no-bg .markdown h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 16px 0 10px 0;
            line-height: 1.5;
        }

        /* 二级标题 */
        .ai-message .bubble.no-bg .markdown h2 {
            font-size: 18px;
            font-weight: 700;
            margin: 14px 0 8px 0;
            line-height: 1.5;
        }

        /* 三级标题 */
        .ai-message .bubble.no-bg .markdown h3 {
            font-size: 16px;
            font-weight: 700;
            margin: 12px 0 6px 0;
            line-height: 1.5;
        }

        /* 普通段落 */
        .ai-message .bubble.no-bg .markdown p {

<body>
    <div id="toast-message" class="toast-message"></div>

    <!-- 登录弹窗 -->

            <div class="form-item">
                <label for="register-username">用户名</label>
                <input type="text" id="register-username" placeholder="3-20位英文/数字/下划线">
                <div class="error-msg" id="register-username-err"></div>
            </div>
            <div class="form-item">
                <label for="register-password">密码</label>
                <input type="password" id="register-password" placeholder="至少6位字符">
                <div class="error-msg" id="register-password-err"></div>
            </div>
            <div class="error-msg" id="register-err"></div>
            <div class="modal-btns">
                <button class="modal-btn cancel-btn" onclick="hideRegisterModal()">取消</button>
                <button class="modal-btn primary-btn" onclick="doRegister()">注册</button>
            </div>

            <div class="register-link login-link">
                <span onclick="switchToLogin()">
                    登录
                </span>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://backup.u850688.nyat.app:54767";
        let isRequesting = false;
        let token = localStorage.getItem("token") || "";
        let username = localStorage.getItem("username") || "";
        let isAdmin = localStorage.getItem("isAdmin") === "true" || localStorage.getItem("admin") === "true" || false;
        let conversations = [];
        let currentConversation = [];
        let currentConversationId = "";
        let openedHistoryMenuIndex = null;
        const SIDEBAR_WIDTH = 260;
        const MIN_CHAT_WIDTH_AFTER_PUSH = 720;

        let toastTimer = null;

        function showToast(message) {
            const toast = document.getElementById("toast-message");
            if (!toast) return;

            toast.textContent = message;
            toast.classList.add("show");

            clearTimeout(toastTimer);

            toastTimer = setTimeout(() => {
                toast.classList.remove("show");
            }, 2200);
        }

        function setConversationTitle(title) {
            const titleEl = document.getElementById("conversation-title");
            titleEl.innerText = title || "新对话";
        }

        function updateSidebarPushMode() {
            const sidebar = document.getElementById("sidebar");
            if (!sidebar) return;

            const isSidebarOpen = sidebar.classList.contains("open");

            /*
            判断窗口宽度是否足够：
            只有剩余宽度还能容纳主对话区时，才启用推开效果。
            */
            const canPushChat = window.innerWidth - SIDEBAR_WIDTH >= MIN_CHAT_WIDTH_AFTER_PUSH;

            document.body.classList.toggle(
                "sidebar-push",
                isSidebarOpen && canPushChat
            );
        }
        
        function updateGreeting() {
            const greetingEl = document.getElementById("greeting");
            if (!greetingEl) return;

            const now = new Date();
            const hour = now.getHours();
            let timeGreeting = "";
            if (hour >= 5 && hour < 12) timeGreeting = "上午好";
            else if (hour >= 12 && hour < 18) timeGreeting = "下午好";
            else if (hour >= 18 && hour < 22) timeGreeting = "晚上好";
            else timeGreeting = "凌晨好";

            const username = localStorage.getItem("username") || "";
            const name = username ? username + "同学" : "同学";
            greetingEl.textContent = `${timeGreeting}，${name}`;
        }

        // 页面加载时调用
        window.addEventListener("load", updateGreeting);

        window.onload = function () {
            checkBackendHealth();
            setInterval(checkBackendHealth, 30000);

            const deepBtn = document.getElementById("deep-btn");
            const saved = localStorage.getItem("deepSearchEnabled");
            if (saved === "true") {
                deepBtn.classList.add("active");
            } else {
                deepBtn.classList.remove("active");
            }

            initUserStatus();
            updateGreeting();
            renderHistoryList();

            updateSidebarPushMode();
            window.addEventListener("resize", updateSidebarPushMode);

            if (token) {
                checkTokenValid();
            }
        };

        let chatScrollTimer = null;

        document.addEventListener("DOMContentLoaded", () => {
            const chat = document.getElementById("chat-messages");
            if (!chat) return;

            chat.addEventListener("scroll", () => {
                chat.classList.add("scrolling");

                clearTimeout(chatScrollTimer);
                chatScrollTimer = setTimeout(() => {
                    chat.classList.remove("scrolling");
                }, 800);
            });
        });

        function initUserStatus() {
            const adminBtn = document.getElementById("admin-btn");

            if (token) {
                adminBtn.classList.toggle("admin-hidden", !isAdmin);
            } else {
                adminBtn.classList.add("admin-hidden");
                adminBtn.classList.remove("active");
            }

            updateSidebarUserInfo();
        }

        function getAvatarText() {
            if (token && username) {
                return username.trim().charAt(0).toUpperCase();
            }
            return "游";
        }

        function updateSidebarUserInfo() {
            const sidebarAvatar = document.getElementById("sidebar-user-avatar");
            const sidebarName = document.getElementById("sidebar-user-name");

            const profileAvatar = document.getElementById("profile-avatar");
            const profileName = document.getElementById("profile-name");
            const profileLoginStatus = document.getElementById("profile-login-status");
            const profileAdminStatus = document.getElementById("profile-admin-status");

            const avatarText = getAvatarText();
            const displayName = token ? (username || "已登录用户") : "未登录";

            if (sidebarAvatar) sidebarAvatar.textContent = avatarText;
            if (sidebarName) sidebarName.textContent = displayName;

            if (profileAvatar) profileAvatar.textContent = avatarText;
            if (profileName) profileName.textContent = displayName;
            if (profileLoginStatus) {
                profileLoginStatus.textContent = token ? "当前状态：已登录" : "当前状态：未登录";
            }
            if (profileAdminStatus) {
                profileAdminStatus.textContent = isAdmin ? "权限：管理员" : "权限：普通用户";
            }

            renderSidebarUserMenu();
        }

        function renderSidebarUserMenu() {
            const menu = document.getElementById("sidebar-user-menu");
            if (!menu) return;

            menu.innerHTML = ""; // 先清空

            if (!token) {
                // 未登录状态显示登录按钮
                const loginBtn = document.createElement("button");
                loginBtn.className = "sidebar-user-menu-item";
                loginBtn.textContent = "登录";
                loginBtn.onclick = (e) => {
                    e.stopPropagation();
                    showLoginModal();
                    closeUserMenu();
                };
                menu.appendChild(loginBtn);
            } else {
                // 已登录状态显示设置和退出登录
                const settingsBtn = document.createElement("button");
                settingsBtn.className = "sidebar-user-menu-item";
                settingsBtn.textContent = "设置";
                settingsBtn.onclick = (e) => {
                    e.stopPropagation();
                    openProfilePage();
                    closeUserMenu();
                };
                menu.appendChild(settingsBtn);

                const logoutBtn = document.createElement("button");
                logoutBtn.className = "sidebar-user-menu-item danger";
                logoutBtn.textContent = "退出登录";
                logoutBtn.onclick = (e) => {
                    e.stopPropagation();
                    closeUserMenu();
                    logout();
                    createNewChat();
                };
                menu.appendChild(logoutBtn);
            }
        }

        function toggleUserMenu(event) {
            event.stopPropagation();

            const menu = document.getElementById("sidebar-user-menu");
            if (!menu) return;

            closeHistoryMenus();
            menu.classList.toggle("hidden");
        }

        function closeUserMenu() {
            const menu = document.getElementById("sidebar-user-menu");
            if (menu) {
                menu.classList.add("hidden");
            }
        }

        function openProfilePage(event) {
            if (event) event.stopPropagation();

            closeUserMenu();

            const chatMessages = document.getElementById("chat-messages");
            const profilePage = document.getElementById("profile-page");
            const inputArea = document.querySelector(".input-area");
            const chatContainer = document.getElementById("chat-container");

            if (chatMessages) chatMessages.style.display = "none";
            if (inputArea) inputArea.style.display = "none";
            if (profilePage) profilePage.style.display = "flex";

            chatContainer.classList.remove("start-mode");
            chatContainer.classList.remove("chat-active");

            setConversationTitle("个人信息");
            updateSidebarUserInfo();
        }

        function closeProfilePage() {
            const chatMessages = document.getElementById("chat-messages");
            const profilePage = document.getElementById("profile-page");
            const inputArea = document.querySelector(".input-area");

            if (profilePage) profilePage.style.display = "none";
            if (chatMessages) chatMessages.style.display = "";
            if (inputArea) inputArea.style.display = "";
        }

        async function checkTokenValid() {
            try {
                const res = await fetch(`${BASE_URL}/user/me?token=${encodeURIComponent(token)}`);

                if (!res.ok) {
                    throw new Error("Token验证接口响应失败：" + res.status);
                }

                const result = await res.json();

                /*
                只有后端明确返回 token 无效时，才清空登录信息。
                避免刷新页面时因为网络波动、后端临时未响应，误删 localStorage。
                */
                if (result.code !== 200) {
                    console.warn("Token 已失效：", result.msg);

                    clearUserInfo();
                    conversations = [];
                    currentConversation = [];
                    currentConversationId = "";

                    initUserStatus();
                    updateGreeting();
                    renderHistoryList();
                    return;
                }

                if (result.data) {
                    username = result.data.username || username;
                    isAdmin = result.data.admin === true;
                }

                localStorage.setItem("token", token);
                localStorage.setItem("username", username);
                localStorage.setItem("isAdmin", String(isAdmin));
                localStorage.setItem("admin", String(isAdmin));

                initUserStatus();
                updateGreeting();
                await loadUserHistory();

            } catch (err) {
                console.error("Token验证接口异常，暂时保留本地登录信息：", err);

                initUserStatus();
                updateGreeting();
                renderHistoryList();
            }
        }

        function clearUserInfo() {
            token = "";
            username = "";
            isAdmin = false;
            localStorage.removeItem("token");
            localStorage.removeItem("username");
            localStorage.removeItem("isAdmin");
            localStorage.removeItem("admin");
            localStorage.removeItem("deepSearchEnabled");
        }

        async function checkBackendHealth() {
            const el = document.getElementById("health-status");
            try {
                const r = await fetch(`${BASE_URL}/health`);
                if (!r.ok) {
                    el.textContent = "服务异常";
                    el.style.background = "rgba(255,70,70,0.2)";
                    return;
                }

                const j = await r.json();
                if (j.code === 200) {
                    el.textContent = "服务正常";
                    el.style.background = "rgba(0,210,110,0.2)";
                } else {
                    el.textContent = "服务异常";
                    el.style.background = "rgba(255,70,70,0.2)";
                }
            } catch (e) {
                console.error("健康检查失败：", e);
                el.textContent = "服务未启动";
                el.style.background = "rgba(255,70,70,0.2)";
            }
        }

        async function sendQuestion() {
            const input = document.getElementById("question-input");
            const btn = document.getElementById("send-btn");
            const deepBtn = document.getElementById("deep-btn");
            const adminBtn = document.getElementById("admin-btn");
            const chat = document.getElementById("chat-messages");

            const q = input.value.trim();
            if (!q || isRequesting) return;

            const chatContainer = document.getElementById("chat-container");
            if (chatContainer.classList.contains("start-mode")) {
                chatContainer.classList.remove("start-mode");
                chatContainer.classList.add("chat-active");
            }

            input.placeholder = "请输入你的问题";

            currentConversation.push({
                role: "user",
                content: q
            });

            isRequesting = true;
            btn.disabled = true;
            input.disabled = true;
            input.value = "";

            const isDeep = deepBtn.classList.contains("active");
            const isAdminMode = isAdmin && adminBtn.classList.contains("active");

            chat.innerHTML += `
            <div class="user-message message">
                <div class="bubble">${escapeHtml(q)}</div>
            </div>`;

            const loadingId = "loading-" + Date.now();
            let loadingText = isDeep ? "深度思考中......" : "AI 思考中......";
            if (isAdminMode) loadingText = "管理员模式 - " + loadingText;
            chat.innerHTML += `<div id="${loadingId}" class="loading">${loadingText}</div>`;
            scrollChatToBottom();

            try {
                const params = new URLSearchParams();
                params.set("question", q);
                if (isDeep) params.set("deep", "true");
                if (isAdminMode) params.set("admin", "true");
                if (token) params.set("token", token);

                // 登录用户继续已有对话档案时才传 conversationId；新对话不传，让后端自动创建。
                // 管理员模式按后端说明暂不接入 conversation_message，所以不传 conversationId。
                if (token && currentConversationId && !isAdminMode) {
                    params.set("conversationId", currentConversationId);
                }

                const ctrl = new AbortController();
                const timer = setTimeout(() => ctrl.abort(), 15000);
                const res = await fetch(`${BASE_URL}/question/ask?${params.toString()}`, {
                    signal: ctrl.signal,
                    method: "GET",
                    headers: {
                        "Accept": "application/json"
                    }
                });
                clearTimeout(timer);

                if (!res.ok) {
                    throw new Error(`请求失败：${res.status} ${res.statusText}`);
                }

                const result = await res.json();

                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                let answer = "";

                if (result.code === 200) {
                if (result.data && typeof result.data === "object") {
                    answer = result.data.answer || "暂无相关回答，可简化问题重试";

                    if (token && !isAdminMode && result.data.conversationId) {
                        const isFirstBackendConversationId = !currentConversationId;
                        currentConversationId = result.data.conversationId;

                        if (isFirstBackendConversationId) {
                            await updateConversationTitle(currentConversationId, q);
                        }
                    }
                } else {
                    answer = result.data || "暂无相关回答，可简化问题重试";
                }
            } else {
                answer = result.msg || "请求失败，请重试";
            }

                const ans = formatAnswerWithSuffix(answer);

                chat.innerHTML += `
                    <div class="ai-message message">
                        <div class="bubble no-bg">
                            ${renderMarkdownToHtml(ans.text)}
                            ${ans.suffix ? `<div class="bubble-suffix">${escapeHtml(ans.suffix)}</div>` : ""}
                        </div>
                    </div>`;

                currentConversation.push({
                    role: "assistant",
                    content: String(answer)
                });

                if (token) {
                    await loadUserHistory();
                }

            } catch (err) {
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                const msg = err.name === "AbortError"
                    ? "请求超时（管理员模式处理可能需要更长时间），请重试"
                    : `请求失败：${err.message}`;

                chat.innerHTML += `
                <div class="ai-message message">
                    <div class="bubble no-bg">
                        <div class="markdown error-markdown">${escapeHtml(msg)}</div>
                    </div>
                </div>`;
                console.error("发送问题失败：", err);
            } finally {
                isRequesting = false;
                btn.disabled = false;
                input.disabled = false;
                input.focus();
                scrollChatToBottom();
            }
        }

        async function doLogin() {
            const usernameEl = document.getElementById("login-username");
            const passwordEl = document.getElementById("login-password");
            const usernameVal = usernameEl.value.trim();
            const passwordVal = passwordEl.value.trim();
            let hasError = false;

            clearLoginErrors();
            const usernameReg = /^[a-zA-Z0-9_]{3,20}$/;
            if (!usernameVal) {
                document.getElementById("login-username-err").textContent = "请输入用户名";
                hasError = true;
            } else if (!usernameReg.test(usernameVal)) {
                document.getElementById("login-username-err").textContent = "用户名只能包含英文、数字、下划线，长度3-20位";
                hasError = true;
            }
            if (!passwordVal) {
                document.getElementById("login-password-err").textContent = "请输入密码";
                hasError = true;
            } else if (passwordVal.length < 6) {
                document.getElementById("login-password-err").textContent = "密码长度至少6位";
                hasError = true;
            }
            if (hasError) return;

            try {
                const res = await fetch(`${BASE_URL}/user/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify({
                        username: usernameVal,
                        password: passwordVal
                    })
                });

                if (!res.ok) {
                    throw new Error(`登录接口响应失败：${res.status}`);
                }

                const result = await res.json();

                if (result.code === 200) {
                    token = result.data.token || "";
                    username = result.data.username || "";
                    isAdmin = result.data.admin || false;

                    localStorage.setItem("token", token);
                    localStorage.setItem("username", username);
                    localStorage.setItem("isAdmin", isAdmin);
                    localStorage.setItem("admin", isAdmin);

                    conversations = [];
                    currentConversation = [];
                    currentConversationId = "";

                    hideLoginModal();
                    updateSidebarUserInfo();
                    initUserStatus();
                    updateGreeting();
                    await loadUserHistory();
                    showToast("登录成功");
                } else {
                    document.getElementById("login-err").textContent =
                        result.msg || "登录失败，请重试";
                }
            } catch (err) {
                console.error("登录请求失败：", err);
                document.getElementById("login-err").textContent = "网络异常或服务未响应，请重试";
            }
        }

        async function renameHistoryConversation(index) {
            const data = conversations[index];

            if (!token) {
                alert("请先登录");
                return;
            }

            if (!data || !data.conversationId) {
                alert("未找到该历史记录");
                return;
            }

            const oldTitle = data.title || "新对话";
            const newTitle = prompt("请输入新的对话标题", oldTitle);

            // 用户点取消
            if (newTitle === null) {
                closeHistoryMenus();
                return;
            }

            const title = newTitle.trim();

            if (!title) {
                alert("标题不能为空");
                return;
            }

            try {
                const params = new URLSearchParams();
                params.set("token", token);
                params.set("conversationId", data.conversationId);
                params.set("title", title);

                const res = await fetch(`${BASE_URL}/conversation/title?${params.toString()}`, {
                    method: "POST"
                });

                if (!res.ok) {
                    throw new Error(`重命名接口响应失败：${res.status}`);
                }

                const result = await res.json();

                if (result.code !== 200) {
                    alert(result.msg || "重命名失败");
                    return;
                }

                closeHistoryMenus();

                // 更新本地标题，避免界面延迟
                data.title = title;

                // 重新拉取历史列表，保证和后端一致
                await loadUserHistory();

            } catch (err) {
                console.error("重命名历史记录失败：", err);
                alert("重命名失败，请稍后重试");
            }
        }

                document
                    .getElementById("chat-container")

                    .add("chat-active");

                setConversationTitle(data.title || "新对话");

                alert("读取历史对话失败，请稍后重试");

        function formatAnswerWithSuffix(answerText) {
            const suffixes = [
                "（知识库信息）",
                "【提示：数据库中没有相关内容，此内容为 AI 自动生成。】",
                "(来自当前对话上传文件)",
                "(来自用户全局知识库)"
            ];

            let mainText = String(answerText || "");
            let detectedSuffix = "";

            for (const s of suffixes) {
                if (mainText.endsWith(s)) {
                    mainText = mainText.slice(0, -s.length).trim();
                    detectedSuffix = s;
                    break;
                }
            }

            return {
                text: mainText,
                suffix: detectedSuffix
            };
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function renderMarkdownToHtml(mdText) {
            if (!mdText) return "";

            const lines = String(mdText || "")
                .replace(/\r\n/g, "\n")
                .replace(/\r/g, "\n")
                .split("\n");

            let html = "";
            let inUl = false;
            let inOl = false;

            function closeLists() {
                if (inUl) {
                    html += "</ul>";
                    inUl = false;
                }
                if (inOl) {
                    html += "</ol>";
                    inOl = false;
                }
            }

            function escapeLine(text) {
                return String(text || "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function parseInline(text) {
                let safe = escapeLine(text);

                /*
                    先保护 **加粗**，避免被 *斜体* 误伤
                */
                safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");

                /*
                    斜体：
                    只处理成对的单星号，例如：*这是斜体*
                    不处理行首的 * 列表符号
                */
                safe = safe.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, "$1<em>$2</em>");

                return safe;
            }

            lines.forEach(rawLine => {
                const line = rawLine.trim();

                if (!line) {
                    closeLists();
                    return;
                }

                /*
                    三级标题：### 标题
                */
                if (/^###\s+/.test(line)) {
                    closeLists();
                    html += `<h3>${parseInline(line.replace(/^###\s+/, ""))}</h3>`;
                    return;
                }

                /*
                    二级标题：## 标题
                */
                if (/^##\s+/.test(line)) {
                    closeLists();
                    html += `<h2>${parseInline(line.replace(/^##\s+/, ""))}</h2>`;
                    return;
                }

                /*
                    一级标题：# 标题
                */
                if (/^#\s+/.test(line)) {
                    closeLists();
                    html += `<h1>${parseInline(line.replace(/^#\s+/, ""))}</h1>`;
                    return;
                }

                /*
                    引用：> 提示内容
                */
                if (/^>\s?/.test(line)) {
                    closeLists();
                    html += `<blockquote>${parseInline(line.replace(/^>\s?/, ""))}</blockquote>`;
                    return;
                }

                /*
                    有序列表：1. 内容 / 2. 内容
                */
                if (/^\d+\.\s+/.test(line)) {
                    if (inUl) {
                        html += "</ul>";
                        inUl = false;
                    }
                    if (!inOl) {
                        html += "<ol>";
                        inOl = true;
                    }

                    html += `<li>${parseInline(line.replace(/^\d+\.\s+/, ""))}</li>`;
                    return;
                }

                /*
                    无序列表：
                    - 内容
                    * 内容
                    • 内容

                    注意：
                    这里的 * 内容 会被当成列表，
                    不是斜体。
                */
                if (/^[-*•]\s+/.test(line)) {
                    if (inOl) {
                        html += "</ol>";
                        inOl = false;
                    }
                    if (!inUl) {
                        html += "<ul>";
                        inUl = true;
                    }

                    html += `<li>${parseInline(line.replace(/^[-*•]\s+/, ""))}</li>`;
                    return;
                }

                /*
                    普通段落
                */
                closeLists();
                html += `<p>${parseInline(line)}</p>`;
            });

            closeLists();

            return `<div class="markdown">${html}</div>`;
        }
    </script>
</body>
</html>
