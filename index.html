<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华南理工校园百事通</title>
<style>
:root{
    --bg:#1e1e1e;
    --panel:#1f1f1f;
    --card:#242424;
    --soft:#2a2a2a;
    --soft-2:#333;
    --hover:#3b3b3b;
    --active:#444;
    --border:#444;
    --text:#e0e0e0;
    --text-strong:#fff;
    --muted:#999;
    --danger:#ff6b6b;
    --shadow:0 10px 28px rgba(0,0,0,.28);
    --side-shadow:6px 0 18px rgba(0,0,0,.28);
    --input-bg:#2a2a2a;
    --ai-bg:#2b2b2b;
    --user-bg:#3a3a3a;
    --send-bg:#fff;
    --send-text:#000;
    --quote-bg:rgba(255,255,255,.05);
    --scroll:#555;
    --sidebar-width:260px;
    --header-h:72px;
}
body.light-theme{
    --bg:#f2f0eb;
    --panel:#f4f1eb;
    --card:#f7f4ef;
    --soft:#eeeae2;
    --soft-2:#e9e4da;
    --hover:#e6e1d7;
    --active:#d8d1c3;
    --border:#d7d2c8;
    --text:#20242b;
    --text-strong:#111827;
    --muted:#767066;
    --danger:#dc2626;
    --shadow:0 12px 32px rgba(64,56,45,.13);
    --side-shadow:6px 0 22px rgba(64,56,45,.14);
    --input-bg:#f7f4ef;
    --ai-bg:#f7f4ef;
    --user-bg:#e1ddd4;
    --send-bg:#111827;
    --send-text:#fff;
    --quote-bg:#e9e4da;
    --scroll:#b9b1a6;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
html,body{width:100%;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text)}
button,input,textarea{font:inherit}
button{cursor:pointer}
.hidden,.admin-hidden{display:none!important}

.toast-message{
    position:fixed;top:28px;left:50%;z-index:3000;
    transform:translate(-50%,-12px);
    max-width:calc(100vw - 28px);
    padding:10px 18px;border-radius:999px;
    background:rgba(70,70,70,.96);color:#fff;
    box-shadow:var(--shadow);opacity:0;pointer-events:none;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    transition:.25s ease;
}
body.light-theme .toast-message{
    background:rgba(247,244,239,.96);
    color:var(--text-strong);
    border:1px solid var(--border);
}
.toast-message.show{opacity:1;transform:translate(-50%,0)}

.chat-container{
    position:fixed;top:0;left:0;width:100vw;height:100vh;
    background:var(--bg);color:var(--text);
    display:flex;flex-direction:column;overflow:hidden;
    transition:left .3s ease,width .3s ease;
}
body.sidebar-open.sidebar-push .chat-container{
    left:var(--sidebar-width);
    width:calc(100vw - var(--sidebar-width));
}

.chat-header{
    height:var(--header-h);
    padding:16px 20px;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    color:var(--text-strong);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    box-shadow:0 1px 10px rgba(64,56,45,.08);
    flex-shrink:0;
}
.chat-header>span{
    position:absolute;left:50%;transform:translateX(-50%);
    max-width:calc(100% - 260px);
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
    font-size:18px;font-weight:700;
}
.user-info{position:absolute;right:16px;display:flex;align-items:center;gap:10px}
.health-status{
    font-size:14px;padding:4px 10px;border-radius:999px;
    background:rgba(255,255,255,.16);
    color:var(--text);
}
body.light-theme .health-status{
    color:#064e3b;
    border:1px solid rgba(16,185,129,.22);
}

.sidebar-toggle{
    position:fixed;left:0;top:0;z-index:300;
    width:64px;height:var(--header-h);
    border:none;border-bottom:1px solid var(--border);
    background:var(--bg);color:var(--text-strong);
    font-size:24px;transition:left .3s ease,background .2s;
}
body.sidebar-open .sidebar-toggle{left:var(--sidebar-width)}

.sidebar{
    position:fixed;left:calc(-1 * var(--sidebar-width));top:0;z-index:200;
    width:var(--sidebar-width);height:100vh;
    background:var(--panel);color:var(--text);
    border-right:1px solid var(--border);
    padding:100px 8px 12px 12px;
    overflow:hidden;transition:left .3s ease,box-shadow .3s ease;
}
.sidebar.open{left:0;box-shadow:var(--side-shadow)}
.sidebar-brand{
    position:absolute;top:6px;left:12px;z-index:1;
    min-height:58px;padding:6px 8px;border-radius:10px;
    display:flex;align-items:center;background:var(--panel);
}
.sidebar-brand img{
    display:block;height:60px;max-width:190px;width:auto;object-fit:contain;border:none;
    filter:brightness(1.18) contrast(1.22) drop-shadow(0 0 1px rgba(255,255,255,.55)) drop-shadow(0 2px 8px rgba(255,255,255,.08));
}
body.light-theme .sidebar-brand img{
    filter:invert(1) brightness(.92) contrast(1.08) drop-shadow(0 1px 4px rgba(15,23,42,.10));
}
.sidebar-content{
    height:100%;display:flex;flex-direction:column;
    padding:0 8px 82px 0;overflow:hidden;
}
.new-chat-card{
    width:calc(100% - 8px);min-height:48px;margin-bottom:10px;
    padding:0 12px;border:1px solid var(--border);border-radius:8px;
    background:var(--soft);color:var(--text);
    display:flex;align-items:center;flex-shrink:0;
}
.new-chat-card:hover{background:var(--hover)}
.history-label{font-size:13px;color:var(--muted);margin:6px 0 4px 4px;flex-shrink:0}
.history-scroll-area{
    flex:1;overflow-y:auto;padding-right:8px;margin-right:-8px;
    scrollbar-gutter:stable;
}
.history-scroll-area.scroll-locked{overflow-y:scroll}
.history-records{display:flex;flex-direction:column;gap:8px;width:100%}
.history-record{
    position:relative;width:100%;min-height:48px;
    padding:12px 42px 12px 12px;border:none;border-radius:8px;
    background:transparent;color:var(--text);
    display:flex;align-items:center;overflow:visible;
    transition:background .2s,box-shadow .2s;
}
.history-record:hover,.history-record.menu-open{
    background:var(--hover);
    box-shadow:0 8px 18px rgba(0,0,0,.22);
}
.history-record.selected{
    background:var(--active);color:var(--text-strong);
    box-shadow:0 8px 18px rgba(0,0,0,.24);
}
.history-record.selected:hover{filter:brightness(1.04)}
.history-record-title{
    flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.history-more-btn{
    position:absolute;right:8px;top:50%;
    transform:translateY(-50%);
    width:26px;height:26px;line-height:26px;
    border:none;border-radius:6px;background:transparent;color:var(--text);
    font-size:18px;opacity:0;transition:.2s;
}
.history-record:hover .history-more-btn,
.history-record.menu-open .history-more-btn{opacity:1}
.history-more-btn:hover,
.history-record.menu-open .history-more-btn{background:rgba(255,255,255,.15)}
body.light-theme .history-more-btn:hover,
body.light-theme .history-record.menu-open .history-more-btn{background:rgba(64,56,45,.10)}
.history-menu,.sidebar-user-menu{
    position:fixed;z-index:1200;width:118px;padding:6px;
    background:#2f2f2f;border:1px solid var(--border);border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
}
body.light-theme .history-menu,
body.light-theme .sidebar-user-menu{background:#f6f3ed;box-shadow:0 12px 30px rgba(64,56,45,.16)}
.history-menu.drop-down{transform-origin:left top}
.history-menu.drop-up{transform-origin:left bottom}
.history-menu-item,.sidebar-user-menu-item{
    width:100%;padding:9px 10px;border:none;border-radius:8px;
    background:transparent;color:var(--text);font-size:14px;text-align:left;
}
.history-menu-item:hover,.sidebar-user-menu-item:hover{background:var(--active)}
body.light-theme .history-menu-item:hover,
body.light-theme .sidebar-user-menu-item:hover{background:var(--soft-2)}
.history-menu-item.danger,.sidebar-user-menu-item.danger{color:var(--danger)}
.history-menu-item.danger:hover,.sidebar-user-menu-item.danger:hover{background:rgba(255,80,80,.15)}

.sidebar-user-area{
    position:absolute;left:0;bottom:0;width:100%;height:72px;z-index:20;
    border-top:1px solid var(--border);background:var(--panel);padding:10px 12px;
}
.sidebar-user-btn{
    width:100%;height:52px;border:none;border-radius:10px;
    background:transparent;color:var(--text);
    display:flex;align-items:center;gap:10px;padding:0 10px;text-align:left;
}
.sidebar-user-btn:hover{background:var(--soft)}
.sidebar-user-avatar,.profile-avatar{
    border-radius:50%;background:var(--active);color:var(--text-strong);
    display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;
}
.sidebar-user-avatar{width:34px;height:34px;font-size:15px}
.sidebar-user-name{
    flex:1;font-size:14px;color:var(--text-strong);
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}

.chat-messages{
    flex:1;width:min(92%,860px);margin:0 auto;
    padding:20px 16px 170px;
    scroll-padding-bottom:170px;
    overflow-y:auto;display:flex;flex-direction:column;gap:16px;
    scrollbar-width:thin;scrollbar-color:transparent transparent;
}
.chat-messages:hover,.chat-messages.scrolling{scrollbar-color:var(--scroll) transparent}
.chat-messages::-webkit-scrollbar,
.history-scroll-area::-webkit-scrollbar,
.settings-content::-webkit-scrollbar{width:6px}
.chat-messages::-webkit-scrollbar-track,
.history-scroll-area::-webkit-scrollbar-track,
.settings-content::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb,
.history-scroll-area::-webkit-scrollbar-thumb,
.settings-content::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:3px}
.chat-messages::-webkit-scrollbar-thumb{background:transparent}
.chat-messages:hover::-webkit-scrollbar-thumb,
.chat-messages.scrolling::-webkit-scrollbar-thumb{background:var(--scroll)}

.message{max-width:85%;display:flex}
.ai-message{align-self:flex-start}
.user-message{align-self:flex-end;flex-direction:row-reverse}
.bubble{
    padding:12px 16px;border-radius:18px;line-height:1.6;
    word-break:break-word;overflow-wrap:anywhere;
}
.user-message .bubble{
    background:var(--user-bg);color:var(--text-strong);
    border-bottom-right-radius:6px;
}
.ai-message .bubble{
    background:var(--ai-bg);color:var(--text);
    border-bottom-left-radius:6px;
}
.ai-message .bubble.no-bg{
    background:none;border-radius:0;padding:0;color:var(--text);
}
.loading{color:var(--muted);font-size:14px;padding:8px 16px}
.bubble-suffix{font-size:12px;color:var(--muted);text-align:right;margin-top:4px}

.markdown{font-size:15px;line-height:1.75;margin-bottom:4px;word-break:break-word}
.markdown h1{font-size:20px;margin:16px 0 10px}
.markdown h2{font-size:18px;margin:14px 0 8px}
.markdown h3{font-size:16px;margin:12px 0 6px}
.markdown h4{font-size:15px;margin:10px 0 5px}
.markdown h1,.markdown h2,.markdown h3,.markdown h4{font-weight:700;line-height:1.5;color:var(--text-strong)}
.markdown p{margin:6px 0}
.markdown ul{padding-left:22px;margin:8px 0}
.markdown ol{padding-left:24px;margin:8px 0}
.markdown li{margin:5px 0;line-height:1.7}
.markdown hr{border:none;height:1px;background:rgba(128,128,128,.28);margin:16px 0}
.markdown blockquote{
    margin:10px 0;padding:8px 12px;border-left:3px solid #888;
    background:var(--quote-bg);color:var(--text);border-radius:6px;
}
.markdown strong{font-weight:700;color:var(--text-strong)}
.markdown em{font-style:italic}

.greeting-text{
    position:absolute;left:50%;top:calc(50% - 130px);z-index:5;
    transform:translateX(-50%);
    width:min(92%,780px);text-align:center;pointer-events:none;
    color:var(--text-strong);font-size:24px;font-weight:700;line-height:1.4;
}
.chat-container.chat-active .greeting-text,
.chat-container:not(.start-mode) .greeting-text{display:none}
.chat-container.start-mode .chat-messages{display:none}

.input-area{
    position:absolute;left:50%;bottom:16px;z-index:10;
    transform:translateX(-50%);
    width:min(92%,780px);
}
.chat-container.start-mode .input-area{
    top:50%;bottom:auto;transform:translate(-50%,-50%);
}
.chat-container.chat-active .input-area{animation:inputDropDown .35s ease forwards}
@keyframes inputDropDown{
    from{top:50%;bottom:auto;transform:translate(-50%,-50%)}
    to{top:auto;bottom:16px;transform:translateX(-50%)}
}
.input-wrapper{position:relative;width:100%}
#question-input{
    width:100%;min-height:118px;max-height:min(200px,50vh);
    padding:16px 100px 52px 18px;
    resize:none;display:block;outline:none;
    border:1px solid var(--border);border-radius:28px;
    background:var(--input-bg);color:var(--text);
    font-size:clamp(14px,1.6vw,16px);line-height:1.7;
    box-shadow:0 10px 30px rgba(64,56,45,.12);
    transition:border-color .2s,box-shadow .2s;
}
#question-input:focus{border-color:#999;box-shadow:0 0 0 1px rgba(255,255,255,.12),0 12px 32px rgba(64,56,45,.14)}
#question-input::placeholder{color:var(--muted)}
.option-buttons{
    position:absolute;left:14px;bottom:12px;z-index:2;
    display:flex;gap:8px;max-width:calc(100% - 110px);
}
.option-btn{
    padding:7px 12px;border-radius:24px;border:1px solid var(--border);
    background:var(--input-bg);color:var(--text);
    font-size:clamp(12px,1.5vw,13px);line-height:1;
    white-space:nowrap;transition:.2s;
}
.option-btn:hover{background:var(--hover);border-color:#999}
.option-btn.active{background:var(--active);border-color:#aaa;color:var(--text-strong)}
#send-btn{
    position:absolute;right:12px;bottom:12px;height:36px;
    padding:0 20px;border:none;border-radius:18px;
    background:var(--send-bg);color:var(--send-text);
    font-size:14px;font-weight:500;transition:.2s;
}
#send-btn:hover{filter:brightness(.94)}
#send-btn:disabled{background:#bdbdbd;color:#555;cursor:not-allowed}

.profile-page,.settings-page{
    flex:1;background:var(--bg);color:var(--text);
    display:none;justify-content:center;align-items:center;padding:24px;
}
.profile-card,.settings-card{
    width:min(92%,860px);min-height:360px;height:min(52vh,460px);
    background:var(--card);border:1px solid var(--border);border-radius:18px;
    box-shadow:var(--shadow);
}
.profile-card{
    padding:28px 24px;text-align:center;
    display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.profile-avatar{width:76px;height:76px;font-size:30px;margin-bottom:16px}
.profile-name{font-size:20px;font-weight:700;color:var(--text-strong);margin-bottom:10px}
.profile-info{font-size:14px;color:var(--muted);line-height:1.8}
.settings-card{overflow:hidden;display:flex}
.settings-sidebar{
    width:190px;flex-shrink:0;padding:18px 12px;
    border-right:1px solid var(--border);background:var(--soft);
}
.settings-sidebar-title{font-size:13px;color:var(--muted);margin:0 0 12px 4px}
.settings-nav-btn{
    width:100%;min-height:42px;padding:0 12px;border:none;border-radius:10px;
    background:transparent;color:var(--text);font-size:14px;text-align:left;
}
.settings-nav-btn:hover,.settings-nav-btn.active{background:var(--active);color:var(--text-strong)}
.settings-content{flex:1;padding:28px 30px;overflow-y:auto;background:var(--card)}
.settings-panel-title{font-size:20px;font-weight:700;color:var(--text-strong);margin-bottom:8px}
.settings-panel-desc{font-size:14px;color:var(--muted);margin-bottom:22px;line-height:1.7}
.theme-options{display:flex;gap:14px;flex-wrap:wrap}
.theme-option-btn{
    min-width:130px;height:44px;padding:0 18px;border-radius:14px;
    border:1px solid var(--border);background:var(--soft);color:var(--text);
    transition:.2s;
}
.theme-option-btn:hover{background:var(--hover);transform:translateY(-1px)}
.theme-option-btn.active{background:var(--send-bg);border-color:var(--send-bg);color:var(--send-text)}

.modal{
    position:fixed;inset:0;z-index:1000;
    background:rgba(0,0,0,.5);
    display:flex;justify-content:center;align-items:center;
}
.rename-modal{z-index:2500}
.modal-content{
    width:90%;max-width:400px;padding:24px;border-radius:12px;
    background:var(--panel);color:var(--text);
    border:1px solid var(--border);box-shadow:var(--shadow);
}
.rename-modal .modal-content{max-width:420px}
.modal-title{font-size:18px;font-weight:700;text-align:center;color:var(--text-strong);margin-bottom:20px}
.form-item{margin-bottom:16px}
.form-item label{display:block;margin-bottom:6px;font-size:14px;color:var(--muted)}
.form-item input{
    width:100%;padding:10px 12px;border-radius:8px;
    border:1px solid transparent;background:var(--soft);color:var(--text);
    font-size:14px;outline:none;
}
.form-item input:focus{border-color:#aaa;box-shadow:0 0 0 1px rgba(255,255,255,.12)}
.form-item input::placeholder{color:var(--muted)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px}
.primary-btn{background:#555;color:#fff}
.primary-btn:hover{background:#666}
body.light-theme .primary-btn{background:#111827;color:#fff}
body.light-theme .primary-btn:hover{background:#273142}
.cancel-btn{background:#e6e6e6;color:#000}
.cancel-btn:hover{background:#f2f2f2}
body.light-theme .cancel-btn{background:#e9e4da;color:#111827}
body.light-theme .cancel-btn:hover{background:#ded8cc}
.register-link,.login-link{margin-top:12px;text-align:right}
.register-link span,.login-link span{display:inline-block;font-size:13px;color:var(--muted);cursor:pointer;padding:2px 4px}
.register-link span:hover,.login-link span:hover{color:var(--text-strong)}
.error-msg{color:var(--danger);font-size:12px;margin-top:4px;min-height:16px}

@media(max-width:900px){
    :root{--header-h:64px}
    .chat-header{padding:12px 14px 12px 64px}
    .chat-header>span{font-size:16px;max-width:48vw}
    .health-status{font-size:12px;padding:4px 8px}
    .sidebar-toggle{width:56px;font-size:22px}
    .sidebar{padding-top:102px}
    .sidebar-brand{top:12px;min-height:52px}
    .sidebar-brand img{height:44px;max-width:172px}
    .chat-messages{width:min(94%,760px);padding:18px 12px 166px}
    .profile-card,.settings-card{width:min(94%,760px);min-height:330px;height:min(50vh,420px)}
    .settings-sidebar{width:170px}
    .input-area,.chat-container.start-mode .input-area{width:min(94%,720px)}
}
@media(max-width:600px){
    :root{--header-h:58px}
    .chat-container{height:100dvh}
    body.sidebar-open.sidebar-push .chat-container{left:0;width:100vw}
    .chat-header{padding:8px 52px}
    .chat-header>span{font-size:15px;max-width:60%}
    .health-status{display:none}
    .sidebar-toggle{width:46px;font-size:20px}
    .sidebar{
        left:-68vw;width:68vw;max-width:260px;height:100dvh;
        padding:94px 8px 68px 10px;
    }
    body.sidebar-open .sidebar-toggle{left:min(68vw,260px)}
    .sidebar-user-area{height:68px;padding:9px 10px}
    .sidebar-user-btn{height:50px}
    .sidebar-user-avatar{width:32px;height:32px;font-size:14px}
    .sidebar-brand{top:10px;left:10px;min-height:46px;padding:4px 6px}
    .sidebar-brand img{height:38px;max-width:150px}
    .new-chat-card,.history-record{min-height:44px;font-size:14px}
    .history-record{padding:10px 40px 10px 10px}
    .history-more-btn{opacity:1;width:28px;height:28px;line-height:28px}
    .history-menu,.sidebar-user-menu{width:112px}
    .chat-messages{width:100%;padding:14px 12px 150px;gap:12px}
    .message{max-width:92%}
    .bubble{padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.65}
    .markdown{font-size:14px}
    .markdown h1{font-size:18px}.markdown h2{font-size:17px}.markdown h3{font-size:16px}
    .profile-page,.settings-page{padding:14px 12px}
    .profile-card{width:100%;min-height:260px;height:min(46vh,360px);padding:22px 16px;border-radius:16px}
    .settings-card{width:100%;min-height:360px;height:min(68vh,520px);border-radius:16px;flex-direction:column}
    .settings-sidebar{width:100%;padding:12px;border-right:none;border-bottom:1px solid var(--border)}
    .settings-content{padding:20px 16px}
    .theme-options{flex-direction:column;gap:10px}
    .theme-option-btn{width:100%}
    .input-area{bottom:10px;width:calc(100vw - 20px)}
    .chat-container.start-mode .input-area{width:calc(100vw - 24px)}
    @keyframes inputDropDown{
        from{top:50%;bottom:auto;transform:translate(-50%,-50%)}
        to{top:auto;bottom:10px;transform:translateX(-50%)}
    }
    #question-input{
        min-height:84px;max-height:116px;
        padding:11px 82px 44px 14px;
        font-size:14px;border-radius:24px;
    }
    .option-buttons{
        left:12px;bottom:10px;gap:6px;

<script>
const BASE_URL = "https://backup.u850688.nyat.app:54767";
const SIDEBAR_WIDTH = 260;
const MIN_CHAT_WIDTH_AFTER_PUSH = 720;
const USERNAME_REG = /^[a-zA-Z0-9_]{3,20}$/;

let isRequesting = false;
let token = localStorage.getItem("token") || "";
let username = localStorage.getItem("username") || "";
let isAdmin = localStorage.getItem("isAdmin") === "true" || localStorage.getItem("admin") === "true";
let conversations = [];
let currentConversation = [];
let currentConversationId = "";
let openedHistoryMenuIndex = null;
let renamingHistoryIndex = null;
let toastTimer = null;
let chatScrollTimer = null;
let lockedHistoryScrollTop = 0;

const $ = (selector) => document.querySelector(selector);
const $$ = (selector) => Array.from(document.querySelectorAll(selector));
const byId = (id) => document.getElementById(id);

function showToast(message) {
    const toast = byId("toast-message");
    if (!toast) return;
    toast.textContent = message;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
}

function setConversationTitle(title) {
    const titleEl = byId("conversation-title");
    if (titleEl) titleEl.innerText = title || "新对话";
}

function escapeHtml(text) {
    return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function applyTheme(themeName, showMessage = false) {
    const safeTheme = themeName === "dark" ? "dark" : "light";
    document.body.classList.toggle("light-theme", safeTheme === "light");
    localStorage.setItem("themeMode", safeTheme);
    updateThemeOptionButtons(safeTheme);
    if (showMessage) showToast(safeTheme === "light" ? "已切换为浅色主题" : "已切换为深色主题");
}

function updateThemeOptionButtons(themeName) {
    $$(".theme-option-btn").forEach(btn => {
        const text = btn.textContent.trim();
        btn.classList.toggle("active",
            (themeName === "light" && text.includes("浅色")) ||
            (themeName === "dark" && text.includes("深色"))
        );
    });
}

function selectThemeOption(themeName) {
    applyTheme(themeName, true);
}

function updateSidebarPushMode() {
    const sidebar = byId("sidebar");
    const isSidebarOpen = sidebar && sidebar.classList.contains("open");
    const canPushChat = window.innerWidth - SIDEBAR_WIDTH >= MIN_CHAT_WIDTH_AFTER_PUSH;
    document.body.classList.toggle("sidebar-push", !!isSidebarOpen && canPushChat);
}

function updateGreeting() {
    const greetingEl = byId("greeting");
    if (!greetingEl) return;

    const hour = new Date().getHours();
    let timeGreeting = "凌晨好";
    if (hour >= 6 && hour < 12) timeGreeting = "上午好";
    else if (hour >= 12 && hour < 14) timeGreeting = "中午好";
    else if (hour >= 14 && hour < 18) timeGreeting = "下午好";
    else if (hour >= 18 && hour < 24) timeGreeting = "晚上好";

    const name = username ? `${username}同学` : "同学";
    greetingEl.textContent = `${timeGreeting}，${name}`;
}

function getAvatarText() {
    return token && username ? username.trim().charAt(0).toUpperCase() : "游";
}

function clearUserInfo() {
    token = "";
    username = "";
    isAdmin = false;
    ["token", "username", "isAdmin", "admin", "deepSearchEnabled"].forEach(key => localStorage.removeItem(key));
}

function saveUserInfo() {
    localStorage.setItem("token", token);
    localStorage.setItem("username", username);
    localStorage.setItem("isAdmin", String(isAdmin));
    localStorage.setItem("admin", String(isAdmin));
}

function initUserStatus() {
    const adminBtn = byId("admin-btn");
    if (adminBtn) {
        adminBtn.classList.toggle("admin-hidden", !(token && isAdmin));
        if (!(token && isAdmin)) adminBtn.classList.remove("active");
    }
    updateSidebarUserInfo();
}

function updateSidebarUserInfo() {
    const avatarText = getAvatarText();
    const displayName = token ? (username || "已登录用户") : "未登录";

    const sidebarAvatar = byId("sidebar-user-avatar");
    const sidebarName = byId("sidebar-user-name");
    const profileAvatar = byId("profile-avatar");
    const profileName = byId("profile-name");
    const profileLoginStatus = byId("profile-login-status");
    const profileAdminStatus = byId("profile-admin-status");

    if (sidebarAvatar) sidebarAvatar.textContent = avatarText;
    if (sidebarName) sidebarName.textContent = displayName;
    if (profileAvatar) profileAvatar.textContent = avatarText;
    if (profileName) profileName.textContent = displayName;
    if (profileLoginStatus) profileLoginStatus.textContent = token ? "当前状态：已登录" : "当前状态：未登录";
    if (profileAdminStatus) profileAdminStatus.textContent = isAdmin ? "权限：管理员" : "权限：普通用户";

    renderSidebarUserMenu();
}

function createMenuButton(text, className, handler) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = className;
    btn.textContent = text;
    btn.onclick = handler;
    return btn;
}

function renderSidebarUserMenu() {
    const menu = byId("sidebar-user-menu");
    if (!menu) return;
    menu.innerHTML = "";

    if (!token) {
        menu.appendChild(createMenuButton("登录", "sidebar-user-menu-item", (e) => {
            e.stopPropagation();
            closeUserMenu();
            showLoginModal();
        }));
        return;
    }

    menu.appendChild(createMenuButton("个人信息", "sidebar-user-menu-item", (e) => {
        e.stopPropagation();
        closeUserMenu();
        openProfilePage();
    }));

    menu.appendChild(createMenuButton("设置", "sidebar-user-menu-item", (e) => {
        e.stopPropagation();
        closeUserMenu();
        openSettingsPage();
    }));

    menu.appendChild(createMenuButton("退出登录", "sidebar-user-menu-item danger", (e) => {
        e.stopPropagation();
        closeUserMenu();
        logout();
    }));
}

function setSidebarUserMenuPosition(menu) {
    const sidebar = byId("sidebar");
    const userBtn = $(".sidebar-user-btn");
    if (!menu || !userBtn) return;

    const btnRect = userBtn.getBoundingClientRect();
    const sidebarRect = sidebar ? sidebar.getBoundingClientRect() : { left: 0, top: 0 };
    const menuWidth = menu.offsetWidth || 118;
    const menuHeight = menu.offsetHeight || 96;
    const gap = 6;

    let left = Math.max(sidebarRect.left + 12, btnRect.right - menuWidth);
    if (left + menuWidth + gap > window.innerWidth) {
        left = Math.max(gap, window.innerWidth - menuWidth - gap);
    }

    let top = Math.max(sidebarRect.top + gap, btnRect.top - menuHeight - gap);
    menu.style.left = `${left}px`;
    menu.style.top = `${top}px`;
}

function toggleUserMenu(event) {
    if (event) event.stopPropagation();

    const menu = byId("sidebar-user-menu");
    if (!menu) return;

    const isUserMenuOpen = !menu.classList.contains("hidden");
    const isHistoryMenuOpen = openedHistoryMenuIndex !== null || !!$(".history-menu");

    if (isHistoryMenuOpen) {
        closeHistoryMenus();
        return;
    }

    if (isUserMenuOpen) {
        closeUserMenu();
        return;
    }

    menu.style.visibility = "hidden";
    menu.classList.remove("hidden");
    setSidebarUserMenuPosition(menu);
    menu.style.visibility = "";
}

function closeUserMenu() {
    const menu = byId("sidebar-user-menu");
    if (!menu) return;
    menu.classList.add("hidden");
    menu.style.visibility = "";
}

function showChatView() {
    const chatMessages = byId("chat-messages");
    const inputArea = $(".input-area");
    const profilePage = byId("profile-page");
    const settingsPage = byId("settings-page");

    if (profilePage) profilePage.style.display = "none";
    if (settingsPage) settingsPage.style.display = "none";
    if (chatMessages) chatMessages.style.display = "";
    if (inputArea) inputArea.style.display = "";
}

function openProfilePage(event) {
    if (event) event.stopPropagation();
    closeUserMenu();
    closeHistoryMenus();

    const chatContainer = byId("chat-container");
    const chatMessages = byId("chat-messages");
    const inputArea = $(".input-area");
    const profilePage = byId("profile-page");
    const settingsPage = byId("settings-page");

    if (chatMessages) chatMessages.style.display = "none";
    if (inputArea) inputArea.style.display = "none";
    if (settingsPage) settingsPage.style.display = "none";
    if (profilePage) profilePage.style.display = "flex";
    if (chatContainer) chatContainer.classList.remove("start-mode", "chat-active");

    setConversationTitle("个人信息");
    updateSidebarUserInfo();
}

function closeProfilePage(restoreChat = true) {
    const profilePage = byId("profile-page");
    if (profilePage) profilePage.style.display = "none";
    if (restoreChat) showChatView();
}

function openSettingsPage(event) {
    if (event) event.stopPropagation();
    closeUserMenu();
    closeHistoryMenus();

    const chatContainer = byId("chat-container");
    const chatMessages = byId("chat-messages");
    const inputArea = $(".input-area");
    const profilePage = byId("profile-page");
    const settingsPage = byId("settings-page");

    if (chatMessages) chatMessages.style.display = "none";
    if (inputArea) inputArea.style.display = "none";
    if (profilePage) profilePage.style.display = "none";
    if (settingsPage) settingsPage.style.display = "flex";
    if (chatContainer) chatContainer.classList.remove("start-mode", "chat-active");

    setConversationTitle("设置");
}

function closeSettingsPage(restoreChat = true) {
    const settingsPage = byId("settings-page");
    if (settingsPage) settingsPage.style.display = "none";
    if (restoreChat) showChatView();
}

function showSettingsPanel(panelName) {
    $$(".settings-nav-btn").forEach(btn => {
        btn.classList.toggle("active", panelName === "theme" && btn.textContent.trim() === "设置主题");
    });
    const themePanel = byId("settings-theme-panel");
    if (themePanel) themePanel.style.display = panelName === "theme" ? "block" : "none";
}

async function checkBackendHealth() {
    const el = byId("health-status");
    if (!el) return;

    try {
        const res = await fetch(`${BASE_URL}/health`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const ok = data.code === 200;
        el.textContent = ok ? "服务正常" : "服务异常";
        el.style.background = ok ? "rgba(0,210,110,.2)" : "rgba(255,70,70,.2)";
    } catch (err) {
        console.error("健康检查失败：", err);
        el.textContent = "服务未启动";
        el.style.background = "rgba(255,70,70,.2)";
    }
}

async function checkTokenValid() {
    if (!token) return;

    try {
        const res = await fetch(`${BASE_URL}/user/me?token=${encodeURIComponent(token)}`);
        if (!res.ok) throw new Error(`Token 验证接口响应失败：${res.status}`);

        const result = await res.json();
        if (result.code !== 200) {
            console.warn("Token 已失效：", result.msg);
            clearUserInfo();
            conversations = [];
            currentConversation = [];
            currentConversationId = "";
            initUserStatus();
            updateGreeting();
            renderHistoryList();
            return;
        }

        if (result.data) {
            username = result.data.username || username;
            isAdmin = result.data.admin === true;
            saveUserInfo();
        }

        initUserStatus();
        updateGreeting();
        await loadUserHistory();
    } catch (err) {
        console.error("Token 验证异常，保留本地登录信息：", err);
        initUserStatus();
        updateGreeting();
        renderHistoryList();
    }
}

function appendUserMessage(content) {
    const chat = byId("chat-messages");
    if (!chat) return;
    chat.insertAdjacentHTML("beforeend", `
        <div class="user-message message">
            <div class="bubble">${escapeHtml(content)}</div>
        </div>
    `);
}

function appendAiMessage(answer) {
    const chat = byId("chat-messages");
    if (!chat) return;

    const ans = formatAnswerWithSuffix(answer);
    chat.insertAdjacentHTML("beforeend", `
        <div class="ai-message message">
            <div class="bubble no-bg">
                ${renderMarkdownToHtml(ans.text)}
                ${ans.suffix ? `<div class="bubble-suffix">${escapeHtml(ans.suffix)}</div>` : ""}
            </div>
        </div>
    `);
}

async function sendQuestion() {
    const input = byId("question-input");
    const btn = byId("send-btn");
    const deepBtn = byId("deep-btn");
    const adminBtn = byId("admin-btn");
    const chat = byId("chat-messages");
    const chatContainer = byId("chat-container");
    if (!input || !btn || !deepBtn || !adminBtn || !chat || !chatContainer) return;

    const q = input.value.trim();
    if (!q || isRequesting) return;

    showChatView();

    if (chatContainer.classList.contains("start-mode")) {
        chatContainer.classList.remove("start-mode");
        chatContainer.classList.add("chat-active");
    }

    input.placeholder = "请输入你的问题";
    currentConversation.push({ role: "user", content: q });

    isRequesting = true;
    btn.disabled = true;
    input.disabled = true;
    input.value = "";

    const isDeep = deepBtn.classList.contains("active");
    const isAdminMode = isAdmin && adminBtn.classList.contains("active");

    appendUserMessage(q);

    const loadingId = `loading-${Date.now()}`;
    let loadingText = isDeep ? "深度思考中......" : "AI 思考中......";
    if (isAdminMode) loadingText = `管理员模式 - ${loadingText}`;
    chat.insertAdjacentHTML("beforeend", `<div id="${loadingId}" class="loading">${loadingText}</div>`);
    scrollChatToBottom();

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), isAdminMode ? 45000 : 20000);

    try {
        const params = new URLSearchParams();
        params.set("question", q);
        if (isDeep) params.set("deep", "true");
        if (isAdminMode) params.set("admin", "true");
        if (token) params.set("token", token);
        if (token && currentConversationId && !isAdminMode) params.set("conversationId", currentConversationId);

        const res = await fetch(`${BASE_URL}/question/ask?${params.toString()}`, {
            signal: ctrl.signal,
            method: "GET",
            headers: { "Accept": "application/json" }
        });

        clearTimeout(timer);
        if (!res.ok) throw new Error(`请求失败：${res.status} ${res.statusText}`);

        const result = await res.json();
        byId(loadingId)?.remove();

        let answer = "";
        if (result.code === 200) {
            if (result.data && typeof result.data === "object") {
                answer = result.data.answer || "暂无相关回答，可简化问题重试";
                if (token && !isAdminMode && result.data.conversationId) {
                    const isFirstBackendConversationId = !currentConversationId;
                    currentConversationId = result.data.conversationId;
                    if (isFirstBackendConversationId) await updateConversationTitle(currentConversationId, q);
                }
            } else {
                answer = result.data || "暂无相关回答，可简化问题重试";
            }
        } else {
            answer = result.msg || "请求失败，请重试";
        }

        appendAiMessage(answer);
        currentConversation.push({ role: "assistant", content: String(answer) });
        if (token) await loadUserHistory();
    } catch (err) {
        clearTimeout(timer);
        byId(loadingId)?.remove();

        const msg = err.name === "AbortError"
            ? "请求超时，请稍后重试"
            : `请求失败：${err.message}`;

        appendAiMessage(msg);
        console.error("发送问题失败：", err);
    } finally {
        isRequesting = false;
        btn.disabled = false;
        input.disabled = false;
        input.focus();
        scrollChatToBottom();
    }
}

function showRenameModal(index) {
    const data = conversations[index];
    if (!token) {
        alert("请先登录");
        return;
    }
    if (!data || !data.conversationId) {
        alert("未找到该历史记录");
        return;
    }

    renamingHistoryIndex = index;
    const modal = byId("rename-modal");
    const input = byId("rename-title-input");
    const err = byId("rename-title-err");
    if (!modal || !input || !err) return;

    err.textContent = "";
    input.value = data.title || "新对话";
    modal.classList.remove("hidden");

    setTimeout(() => {
        input.focus();
        input.select();
    }, 0);
}

function hideRenameModal() {
    const modal = byId("rename-modal");
    const input = byId("rename-title-input");
    const err = byId("rename-title-err");

    if (modal) modal.classList.add("hidden");
    if (input) input.value = "";
    if (err) err.textContent = "";

    renamingHistoryIndex = null;
    closeHistoryMenus();
}

async function confirmRenameConversation() {
    const index = renamingHistoryIndex;
    const data = conversations[index];
    const input = byId("rename-title-input");
    const err = byId("rename-title-err");
    if (!input || !err) return;

    if (!token) {
        alert("请先登录");
        return;
    }
    if (!data || !data.conversationId) {
        err.textContent = "未找到该历史记录";
        return;
    }

    const title = input.value.trim();
    if (!title) {
        err.textContent = "标题不能为空";
        input.focus();
        return;
    }
    if (title.length > 50) {
        err.textContent = "标题不能超过 50 个字符";
        input.focus();
        return;
    }

    try {
        const params = new URLSearchParams({ token, conversationId: data.conversationId, title });
        const res = await fetch(`${BASE_URL}/conversation/title?${params.toString()}`, { method: "POST" });
        if (!res.ok) throw new Error(`重命名接口响应失败：${res.status}`);

        const result = await res.json();
        if (result.code !== 200) {
            err.textContent = result.msg || "重命名失败";
            return;
        }

        const historyScrollArea = $(".history-scroll-area");
        const keepTop = historyScrollArea ? historyScrollArea.scrollTop : 0;

        data.title = title;
        if (data.conversationId === currentConversationId) setConversationTitle(title);

        const modal = byId("rename-modal");
        if (modal) modal.classList.add("hidden");

        renamingHistoryIndex = null;
        closeHistoryMenus();
        renderHistoryList();

        const newArea = $(".history-scroll-area");
        if (newArea) {
            newArea.scrollTop = keepTop;
            requestAnimationFrame(() => newArea.scrollTop = keepTop);
        }
    } catch (errObj) {
        console.error("重命名历史记录失败：", errObj);
        err.textContent = "重命名失败，请稍后重试";
    }
}

function showLoginModal() {
    clearLoginErrors();
    byId("login-modal")?.classList.remove("hidden");
    setTimeout(() => byId("login-username")?.focus(), 0);
}

function hideLoginModal() {
    byId("login-modal")?.classList.add("hidden");
    clearLoginErrors();
}

function clearLoginErrors() {
    ["login-username-err", "login-password-err", "login-err"].forEach(id => {
        const el = byId(id);
        if (el) el.textContent = "";
    });
}

function showRegisterModal() {
    clearRegisterErrors();
    byId("register-modal")?.classList.remove("hidden");
    setTimeout(() => byId("register-username")?.focus(), 0);
}

function hideRegisterModal() {
    byId("register-modal")?.classList.add("hidden");
    clearRegisterErrors();
}

function clearRegisterErrors() {
    ["register-username-err", "register-password-err", "register-err"].forEach(id => {
        const el = byId(id);
        if (el) el.textContent = "";
    });
}

function switchToRegister() {
    hideLoginModal();
    showRegisterModal();
}

function switchToLogin() {
    hideRegisterModal();
    showLoginModal();
}

function validateAccount(usernameVal, passwordVal, prefix) {
    let hasError = false;
    const usernameErr = byId(`${prefix}-username-err`);
    const passwordErr = byId(`${prefix}-password-err`);

    if (!usernameVal) {
        usernameErr.textContent = "请输入用户名";
        hasError = true;
    } else if (!USERNAME_REG.test(usernameVal)) {
        usernameErr.textContent = "用户名只能包含英文、数字、下划线，长度3-20位";
        hasError = true;
    }

    if (!passwordVal) {
        passwordErr.textContent = "请输入密码";
        hasError = true;
    } else if (passwordVal.length < 6) {
        passwordErr.textContent = "密码长度至少6位";
        hasError = true;
    }

    return !hasError;
}

async function doLogin() {
    const usernameEl = byId("login-username");
    const passwordEl = byId("login-password");
    if (!usernameEl || !passwordEl) return;

    const usernameVal = usernameEl.value.trim();
    const passwordVal = passwordEl.value.trim();

    clearLoginErrors();
    if (!validateAccount(usernameVal, passwordVal, "login")) return;

    try {
        const res = await fetch(`${BASE_URL}/user/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({ username: usernameVal, password: passwordVal })
        });

        if (!res.ok) throw new Error(`登录接口响应失败：${res.status}`);
        const result = await res.json();

        if (result.code !== 200) {
            byId("login-err").textContent = result.msg || "登录失败，请重试";
            return;
        }

        token = result.data?.token || "";
        username = result.data?.username || usernameVal;
        isAdmin = result.data?.admin === true;
        saveUserInfo();

        conversations = [];
        currentConversation = [];
        currentConversationId = "";

        hideLoginModal();
        initUserStatus();
        updateGreeting();
        await loadUserHistory();
        showToast("登录成功");
    } catch (err) {
        console.error("登录请求失败：", err);
        byId("login-err").textContent = "网络异常或服务未响应，请重试";
    }
}

async function doRegister() {
    const usernameEl = byId("register-username");
    const passwordEl = byId("register-password");
    if (!usernameEl || !passwordEl) return;

    const usernameVal = usernameEl.value.trim();
    const passwordVal = passwordEl.value.trim();

    clearRegisterErrors();
    if (!validateAccount(usernameVal, passwordVal, "register")) return;

    try {
        const res = await fetch(`${BASE_URL}/user/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({ username: usernameVal, password: passwordVal })
        });

        if (!res.ok) throw new Error(`注册接口响应失败：${res.status}`);
        const result = await res.json();

        if (result.code === 200) {
            showToast("注册成功，请登录");
            switchToLogin();
        } else {
            byId("register-err").textContent = result.msg || "注册失败，请更换用户名重试";
        }
    } catch (err) {
        console.error("注册请求失败：", err);
        byId("register-err").textContent = "网络异常或服务未响应，请重试";
    }
}

function logout() {
    clearUserInfo();
    conversations = [];
    currentConversation = [];
    currentConversationId = "";
    initUserStatus();
    updateGreeting();
    renderHistoryList();
    createNewChat(false);
    showToast("已退出登录");
}

function createNewChat(shouldReloadHistory = true) {
    closeProfilePage();
    closeSettingsPage();
    closeHistoryMenus();
    closeUserMenu();

    currentConversation = [];
    currentConversationId = "";

    const chatContainer = byId("chat-container");
    const chat = byId("chat-messages");
    const input = byId("question-input");

    if (chatContainer) {
        chatContainer.classList.remove("chat-active");
        chatContainer.classList.add("start-mode");
    }
    if (chat) chat.innerHTML = "";
    if (input) {
        input.value = "";
        input.placeholder = "你好！我是华南理工校园百事通，有任何校园问题都可以问我～";
        input.focus();
    }

    setConversationTitle("新对话");
    renderHistoryList();

    if (token && shouldReloadHistory) loadUserHistory();
}

function toggleSidebar() {
    const isHistoryMenuOpen = openedHistoryMenuIndex !== null || !!$(".history-menu");
    const userMenu = byId("sidebar-user-menu");
    const isUserMenuOpen = userMenu && !userMenu.classList.contains("hidden");

    if (isHistoryMenuOpen || isUserMenuOpen) {
        closeHistoryMenus();
        closeUserMenu();
        return;
    }

    const sidebar = byId("sidebar");
    if (!sidebar) return;

    sidebar.classList.toggle("open");
    document.body.classList.toggle("sidebar-open", sidebar.classList.contains("open"));
    updateSidebarPushMode();
}

function renderHistoryList() {
    const list = byId("history-list");
    if (!list) return;
    list.innerHTML = "";

    if (!token) return;

    conversations.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "history-record";
        div.classList.toggle("selected", item.conversationId && item.conversationId === currentConversationId);
        div.onclick = () => openConversation(index);

        const titleSpan = document.createElement("span");
        titleSpan.className = "history-record-title";
        titleSpan.innerText = item.title || "新对话";

        const moreBtn = document.createElement("button");
        moreBtn.type = "button";
        moreBtn.className = "history-more-btn";
        moreBtn.innerHTML = "⋯";
        moreBtn.title = "更多操作";
        moreBtn.onclick = (event) => {
            event.stopPropagation();
            toggleHistoryMenu(index, div);
        };

        div.appendChild(titleSpan);
        div.appendChild(moreBtn);
        list.appendChild(div);
    });
}

function lockHistoryScroll() {
    const area = $(".history-scroll-area");
    if (!area) return;
    lockedHistoryScrollTop = area.scrollTop;
    area.classList.add("scroll-locked");
}

function unlockHistoryScroll() {
    const area = $(".history-scroll-area");
    if (area) area.classList.remove("scroll-locked");
    lockedHistoryScrollTop = 0;
}

function closeHistoryMenus() {
    openedHistoryMenuIndex = null;
    $$(".history-menu").forEach(menu => menu.remove());
    $$(".history-record.menu-open").forEach(record => record.classList.remove("menu-open"));
    unlockHistoryScroll();
}

function setHistoryMenuDirection(recordEl, menu) {
    const sidebar = byId("sidebar");
    const userArea = $(".sidebar-user-area");
    const scrollArea = recordEl.closest(".history-scroll-area");
    const moreBtn = recordEl.querySelector(".history-more-btn");

    const btnRect = moreBtn ? moreBtn.getBoundingClientRect() : recordEl.getBoundingClientRect();
    const sidebarRect = sidebar ? sidebar.getBoundingClientRect() : { left: 0, top: 0, bottom: window.innerHeight };
    const userAreaRect = userArea ? userArea.getBoundingClientRect() : null;
    const scrollAreaRect = scrollArea ? scrollArea.getBoundingClientRect() : null;

    const menuWidth = menu.offsetWidth || 118;
    const menuHeight = menu.offsetHeight || 104;
    const gap = 8;

    let left = btnRect.left;
    if (left + menuWidth + gap > window.innerWidth) {
        left = Math.max(gap, window.innerWidth - menuWidth - gap);
    }

    const bottomLimit = Math.min(
        userAreaRect ? userAreaRect.top : window.innerHeight,
        scrollAreaRect ? scrollAreaRect.bottom : window.innerHeight,
        window.innerHeight - gap
    );
    const topLimit = Math.max(
        scrollAreaRect ? scrollAreaRect.top : sidebarRect.top,
        sidebarRect.top,
        gap
    );

    const downTop = btnRect.bottom + gap;
    const upTop = btnRect.top - menuHeight - gap;
    const enoughBelow = downTop + menuHeight <= bottomLimit;
    const enoughAbove = upTop >= topLimit;

    menu.classList.remove("drop-down", "drop-up");
    menu.style.left = `${left}px`;

    if (!enoughBelow && enoughAbove) {
        menu.classList.add("drop-up");
        menu.style.top = `${upTop}px`;
    } else {
        menu.classList.add("drop-down");
        menu.style.top = `${Math.max(topLimit, Math.min(downTop, bottomLimit - menuHeight))}px`;
    }
}

function toggleHistoryMenu(index, recordEl) {
    const userMenu = byId("sidebar-user-menu");
    const isUserMenuOpen = userMenu && !userMenu.classList.contains("hidden");
    const isHistoryMenuOpen = openedHistoryMenuIndex !== null || !!$(".history-menu");

    if (isUserMenuOpen) {
        closeUserMenu();
        return;
    }

    if (isHistoryMenuOpen) {
        closeHistoryMenus();
        return;
    }

    openedHistoryMenuIndex = index;
    recordEl.classList.add("menu-open");
    lockHistoryScroll();

    const menu = document.createElement("div");
    menu.className = "history-menu";
    menu.style.visibility = "hidden";
    menu.onclick = (event) => event.stopPropagation();

    menu.appendChild(createMenuButton("重命名", "history-menu-item", (event) => {
        event.stopPropagation();
        showRenameModal(index);
    }));

    menu.appendChild(createMenuButton("删除", "history-menu-item danger", (event) => {
        event.stopPropagation();
        deleteHistoryConversation(index);
    }));

    document.body.appendChild(menu);
    setHistoryMenuDirection(recordEl, menu);
    menu.style.visibility = "";
}

async function deleteHistoryConversation(index) {
    const data = conversations[index];

    if (!token) {
        alert("请先登录");
        return;
    }
    if (!data || !data.conversationId) {
        alert("未找到该历史记录");
        return;
    }

    if (!confirm(`确定要删除「${data.title || "新对话"}」吗？`)) {
        closeHistoryMenus();
        return;
    }

    try {
        const params = new URLSearchParams({ token, conversationId: data.conversationId });
        const res = await fetch(`${BASE_URL}/conversation/archive?${params.toString()}`, { method: "POST" });
        if (!res.ok) throw new Error(`删除接口响应失败：${res.status}`);

        const result = await res.json();
        if (result.code !== 200) {
            alert(result.msg || "删除失败");
            return;
        }

        closeHistoryMenus();

        if (currentConversationId === data.conversationId) {
            createNewChat(false);
        }

        await loadUserHistory();
    } catch (err) {
        console.error("删除历史记录失败：", err);
        alert("删除失败，请稍后重试");
    }
}

async function loadUserHistory() {
    if (!token) {
        conversations = [];
        renderHistoryList();
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/conversation/list?token=${encodeURIComponent(token)}`);
        if (!res.ok) throw new Error(`历史记录接口响应失败：${res.status}`);

        const result = await res.json();
        if (result.code === 200 && Array.isArray(result.data)) {
            conversations = result.data.map(item => ({
                id: item.conversationId,
                conversationId: item.conversationId,
                title: item.title || "新对话",
                messages: []
            }));
        } else {
            conversations = [];
            console.error("读取历史记录失败：", result.msg);
        }

        renderHistoryList();
    } catch (err) {
        console.error("读取历史记录失败：", err);
    }
}

async function openConversation(index) {
    if (!token) {
        alert("请先登录");
        return;
    }

    closeProfilePage();
    closeSettingsPage();
    closeHistoryMenus();

    const data = conversations[index];
    if (!data || !data.conversationId) return;

    try {
        const res = await fetch(
            `${BASE_URL}/conversation/messages?token=${encodeURIComponent(token)}&conversationId=${encodeURIComponent(data.conversationId)}`
        );
        if (!res.ok) throw new Error(`历史详情接口响应失败：${res.status}`);

        const result = await res.json();
        if (result.code !== 200 || !Array.isArray(result.data)) {
            alert(result.msg || "读取历史对话失败");
            return;
        }

        const chat = byId("chat-messages");
        const chatContainer = byId("chat-container");
        const input = byId("question-input");

        if (chat) chat.innerHTML = "";
        currentConversation = result.data.map(msg => {
            const role = msg.role === "USER" ? "user" : "assistant";
            const content = msg.content || "";
            if (role === "user") appendUserMessage(content);
            else appendAiMessage(content);
            return { role, content };
        });

        currentConversationId = data.conversationId;

        if (chatContainer) {
            chatContainer.classList.remove("start-mode");
            chatContainer.classList.add("chat-active");
        }

        if (input) input.placeholder = "请输入你的问题";
        setConversationTitle(data.title || "新对话");
        renderHistoryList();
        scrollChatToBottom();
    } catch (err) {
        console.error("拉取对话档案失败：", err);
        alert("读取历史对话失败，请稍后重试");
    }
}

async function updateConversationTitle(conversationId, title) {
    if (!token || !conversationId || !title) return;

    try {
        const params = new URLSearchParams({ token, conversationId, title });
        const res = await fetch(`${BASE_URL}/conversation/title?${params.toString()}`, { method: "POST" });
        const result = await res.json();

        if (result.code !== 200) {
            console.error("修改对话标题失败：", result.msg);
            return;
        }

        const item = conversations.find(c => c.conversationId === conversationId);
        if (item) item.title = title;
        setConversationTitle(title);
    } catch (err) {
        console.error("修改对话标题失败：", err);
    }
}

function scrollChatToBottom() {
    const chat = byId("chat-messages");
    if (!chat) return;
    setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
}

function formatAnswerWithSuffix(answerText) {
    const suffixes = [
        "（知识库信息）",
        "【提示：数据库中没有相关内容，此内容为 AI 自动生成。】",
        "(来自当前对话上传文件)",
        "(来自用户全局知识库)"
    ];

    let mainText = String(answerText || "");
    let detectedSuffix = "";

    for (const suffix of suffixes) {
        if (mainText.endsWith(suffix)) {
            mainText = mainText.slice(0, -suffix.length).trim();
            detectedSuffix = suffix;
            break;
        }
    }

    return { text: mainText, suffix: detectedSuffix };
}

function toggleDeepSearch() {
    const deepBtn = byId("deep-btn");
    if (!deepBtn) return;
    deepBtn.classList.toggle("active");
    localStorage.setItem("deepSearchEnabled", String(deepBtn.classList.contains("active")));
}

function toggleAdminMode() {
    if (!isAdmin) return;
    byId("admin-btn")?.classList.toggle("active");
}

function renderMarkdownToHtml(mdText) {
    if (!mdText) return `<div class="markdown"></div>`;

    const lines = String(mdText)
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .split("\n");

    let html = "";
    let inUl = false;
    let inOl = false;

    function closeLists() {
        if (inUl) {
            html += "</ul>";
            inUl = false;
        }
        if (inOl) {
            html += "</ol>";
            inOl = false;
        }
    }

    function parseInline(text) {
        let safe = escapeHtml(text);
        safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        safe = safe.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, "$1<em>$2</em>");
        return safe;
    }

    lines.forEach(rawLine => {
        const line = rawLine.trim();

        if (!line) {
            closeLists();
            return;
        }

        if (/^(-{3,}|\*{3,}|_{3,})$/.test(line)) {
            closeLists();
            html += "<hr>";
            return;
        }

        if (/^####\s*/.test(line)) {
            closeLists();
            html += `<h4>${parseInline(line.replace(/^####\s*/, ""))}</h4>`;
            return;
        }

        if (/^###\s+/.test(line)) {
            closeLists();
            html += `<h3>${parseInline(line.replace(/^###\s+/, ""))}</h3>`;
            return;
        }

        if (/^##\s+/.test(line)) {
            closeLists();
            html += `<h2>${parseInline(line.replace(/^##\s+/, ""))}</h2>`;
            return;
        }

        if (/^#\s+/.test(line)) {
            closeLists();
            html += `<h1>${parseInline(line.replace(/^#\s+/, ""))}</h1>`;
            return;
        }

        if (/^>\s?/.test(line)) {
            closeLists();
            html += `<blockquote>${parseInline(line.replace(/^>\s?/, ""))}</blockquote>`;
            return;
        }

        if (/^\d+\.\s+/.test(line)) {
            if (inUl) {
                html += "</ul>";
                inUl = false;
            }
            if (!inOl) {
                html += "<ol>";
                inOl = true;
            }
            html += `<li>${parseInline(line.replace(/^\d+\.\s+/, ""))}</li>`;
            return;
        }

        if (/^[-*•]\s+/.test(line)) {
            if (inOl) {
                html += "</ol>";
                inOl = false;
            }
            if (!inUl) {
                html += "<ul>";
                inUl = true;
            }
            html += `<li>${parseInline(line.replace(/^[-*•]\s+/, ""))}</li>`;
            return;
        }

        closeLists();
        html += `<p>${parseInline(line)}</p>`;
    });

    closeLists();
    return `<div class="markdown">${html}</div>`;
}

function setupEvents() {
    const chat = byId("chat-messages");
    if (chat) {
        chat.addEventListener("scroll", () => {
            chat.classList.add("scrolling");
            clearTimeout(chatScrollTimer);
            chatScrollTimer = setTimeout(() => chat.classList.remove("scrolling"), 800);
        });
    }

    const historyScrollArea = $(".history-scroll-area");
    if (historyScrollArea) {
        historyScrollArea.addEventListener("wheel", (event) => {
            if (historyScrollArea.classList.contains("scroll-locked")) event.preventDefault();
        }, { passive: false });

        historyScrollArea.addEventListener("touchmove", (event) => {
            if (historyScrollArea.classList.contains("scroll-locked")) event.preventDefault();
        }, { passive: false });

        historyScrollArea.addEventListener("scroll", () => {
            if (historyScrollArea.classList.contains("scroll-locked")) {
                historyScrollArea.scrollTop = lockedHistoryScrollTop;
            }
        });
    }

    const input = byId("question-input");
    if (input) {
        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey && !event.isComposing) {
                event.preventDefault();
                sendQuestion();
            }
        });
    }

    const renameInput = byId("rename-title-input");
    if (renameInput) {
        renameInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.isComposing) {
                event.preventDefault();
                confirmRenameConversation();
            }
            if (event.key === "Escape") {
                event.preventDefault();
                hideRenameModal();
            }
        });
    }

    [["login", doLogin], ["register", doRegister]].forEach(([prefix, handler]) => {
        [`${prefix}-username`, `${prefix}-password`].forEach(id => {
            const el = byId(id);
            if (!el) return;
            el.addEventListener("keydown", (event) => {
                const modal = byId(`${prefix}-modal`);
                if (event.key === "Enter" && !event.isComposing && modal && !modal.classList.contains("hidden")) {
                    event.preventDefault();
                    handler();
                }
            });
        });
    });

    document.addEventListener("click", (event) => {
        const sidebar = byId("sidebar");
        const clickedHistoryMenu = event.target.closest(".history-menu");
        const clickedHistoryMoreBtn = event.target.closest(".history-more-btn");
        const clickedSidebarUserMenu = event.target.closest(".sidebar-user-menu");
        const clickedSidebarUserBtn = event.target.closest(".sidebar-user-btn");
        const clickedInsideSidebar = sidebar && sidebar.contains(event.target);

        if (clickedHistoryMenu || clickedHistoryMoreBtn || clickedSidebarUserMenu || clickedSidebarUserBtn) return;

        if (clickedInsideSidebar) {
            closeHistoryMenus();
            closeUserMenu();
            return;
        }

        closeHistoryMenus();
        closeUserMenu();
    });

    window.addEventListener("resize", () => {
        updateSidebarPushMode();
        closeHistoryMenus();
        closeUserMenu();
    });
}

function initPage() {
    applyTheme(localStorage.getItem("themeMode") || "light", false);

    const deepBtn = byId("deep-btn");
    if (deepBtn) deepBtn.classList.toggle("active", localStorage.getItem("deepSearchEnabled") === "true");

    setupEvents();
    initUserStatus();
    updateGreeting();
    renderHistoryList();
    updateSidebarPushMode();
    checkBackendHealth();
    setInterval(checkBackendHealth, 30000);

    if (token) checkTokenValid();
}

document.addEventListener("DOMContentLoaded", initPage);
