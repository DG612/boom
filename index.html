<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华南理工校园百事通</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f7fa;
        }

        .chat-container {
            width: 100vw;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        .chat-header {
            padding: 16px 20px;
            background: #409eff;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .health-status {
            font-size: 14px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            display: flex;
        }

        .ai-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .ai-message .bubble {
            background: #f1f3f4;
            color: #333;
            border-bottom-left-radius: 6px;
        }

        .user-message .bubble {
            background: #409eff;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .input-area {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: #fff;
        }

        #question-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            outline: none;
            font-size: 14px;
            transition: border 0.2s;
        }

        #question-input:focus {
            border-color: #409eff;
        }

        .deep-option {
            white-space: nowrap;
            font-size: 14px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #send-btn {
            padding: 12px 20px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #338eef;
        }

        #send-btn:disabled {
            background: #a0cfff;
            cursor: not-allowed;
        }

        .loading {
            color: #999;
            font-size: 14px;
            padding: 8px 16px;
        }

    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <span>华南理工校园百事通</span>
            <span id="health-status" class="health-status">检查服务中...</span>
        </div>

        <div id="chat-messages" class="chat-messages">
            <div class="ai-message message">
                <div class="bubble"> 
                    你好！我是华南理工校园百事通，有任何校园问题都可以问我～
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="question-input"
                placeholder="请输入你的问题"
                onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();sendQuestion();}"></textarea>
            <label class="deep-option">
                <input type="checkbox" id="deep-search-checkbox"> 深度搜索
            </label>
            <button id="send-btn" onclick="sendQuestion()">发送</button>
        </div>
    </div>

    <script>
        const BASE_URL = "https://backup.u850688.nyat.app:44399";
        let isRequesting = false;

        window.onload = function () {
            checkBackendHealth();
            setInterval(checkBackendHealth, 30000);

            const deepCb = document.getElementById("deep-search-checkbox");
            const saved = localStorage.getItem("deepSearchEnabled");
            deepCb.checked = saved === "true";
            deepCb.addEventListener("change", () => {
                localStorage.setItem("deepSearchEnabled", deepCb.checked);
            });
        };

        async function checkBackendHealth() {
            const el = document.getElementById("health-status");
            try {
                const r = await fetch(`${BASE_URL}/health`);
                const j = await r.json();
                if (j.code === 200) {
                    el.textContent = "服务正常";
                    el.style.background = "rgba(0,210,110,0.2)";
                } else {
                    el.textContent = "服务异常";
                    el.style.background = "rgba(255,70,70,0.2)";
                }
            } catch (e) {
                el.textContent = "服务未启动";
                el.style.background = "rgba(255,70,70,0.2)";
            }
        }

        async function sendQuestion() {
            const input = document.getElementById("question-input");
            const btn = document.getElementById("send-btn");
            const deepCb = document.getElementById("deep-search-checkbox");
            const chat = document.getElementById("chat-messages");

            const q = input.value.trim();
            if (!q || isRequesting) return;

            isRequesting = true;
            btn.disabled = true;
            input.disabled = true;
            input.value = "";

            const isDeep = deepCb.checked;

            chat.innerHTML += `
            <div class="user-message message">
                <div class="bubble">${q}</div>
            </div>`;

            const loadingId = "loading-" + Date.now();
            const loadingText = isDeep ? "深度思考中......" : "AI 思考中......";
            chat.innerHTML += `<div id="${loadingId}" class="loading">${loadingText}</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                let url = `${BASE_URL}/question/ask?question=${encodeURIComponent(q)}`;
                if (isDeep) url += "&deep=true";

                const ctrl = new AbortController();
                const timer = setTimeout(() => ctrl.abort(), 10000);
                const res = await fetch(url, { signal: ctrl.signal });
                clearTimeout(timer);
                const result = await res.json();

                document.getElementById(loadingId).remove();

                let answer = result.data || "暂无相关回答，可简化问题重试";
                answer = answer
                  .replace(/（根据知识库信息）/g, "")
                  .trim();

                chat.innerHTML += `
                <div class="ai-message message">
                    <div class="bubble">${answer}</div> <!-- 移除了 animate-fade-in 类 -->
                </div>`;

            } catch (err) {
                document.getElementById(loadingId).remove();
                const msg = err.name === "AbortError" ? "请求超时，请重试" : "请求失败：" + err.message;
                chat.innerHTML += `
                <div class="ai-message message">
                    <div class="bubble" style="color:#f56c6c">${msg}</div> <!-- 移除了 animate-fade-in 类 -->
                </div>`;
            } finally {
                isRequesting = false;
                btn.disabled = false;
                input.disabled = false;
                input.focus();
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
