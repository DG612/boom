<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华南理工校园百事通</title>
<style>
:root{
    --bg:#1e1e1e;
    --panel:#1f1f1f;
    --card:#242424;
    --soft:#2a2a2a;
    --soft-2:#333;
    --hover:#3b3b3b;
    --active:#444;
    --border:#444;
    --text:#e0e0e0;
    --text-strong:#fff;
    --muted:#999;
    --danger:#ff6b6b;
    --shadow:0 10px 28px rgba(0,0,0,.28);
    --side-shadow:6px 0 18px rgba(0,0,0,.28);
    --input-bg:#2a2a2a;
    --ai-bg:#2b2b2b;
    --user-bg:#3a3a3a;
    --send-bg:#fff;
    --send-text:#000;
    --quote-bg:rgba(255,255,255,.05);
    --scroll:#555;
    --sidebar-width:260px;
    --header-h:72px;
    --input-reserve:170px;
}
body.light-theme{
    --bg:#f2f0eb;
    --panel:#f4f1eb;
    --card:#f7f4ef;
    --soft:#eeeae2;
    --soft-2:#e9e4da;
    --hover:#e6e1d7;
    --active:#d8d1c3;
    --border:#d7d2c8;
    --text:#20242b;
    --text-strong:#111827;
    --muted:#767066;
    --danger:#dc2626;
    --shadow:0 12px 32px rgba(64,56,45,.13);
    --side-shadow:6px 0 22px rgba(64,56,45,.14);
    --input-bg:#f7f4ef;
    --ai-bg:#f7f4ef;
    --user-bg:#e1ddd4;
    --send-bg:#111827;
    --send-text:#fff;
    --quote-bg:#e9e4da;
    --scroll:#b9b1a6;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
html,body{width:100%;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text)}
button,input,textarea{font:inherit}
button{cursor:pointer}
.hidden,.admin-hidden{display:none!important}

.toast-message{
    position:fixed;top:28px;left:50%;z-index:3000;
    transform:translate(-50%,-12px);
    max-width:calc(100vw - 28px);
    padding:10px 18px;border-radius:999px;
    background:rgba(70,70,70,.96);color:#fff;
    box-shadow:var(--shadow);opacity:0;pointer-events:none;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    transition:.25s ease;
}
body.light-theme .toast-message{
    background:rgba(247,244,239,.96);
    color:var(--text-strong);
    border:1px solid var(--border);
}
.toast-message.show{opacity:1;transform:translate(-50%,0)}

.chat-container{
    position:fixed;top:0;left:0;width:100vw;height:100vh;
    background:var(--bg);color:var(--text);
    display:flex;flex-direction:column;overflow:hidden;
    transition:left .3s ease,width .3s ease;
}
body.sidebar-open.sidebar-push .chat-container{
    left:var(--sidebar-width);
    width:calc(100vw - var(--sidebar-width));
}

.chat-header{
    height:var(--header-h);
    padding:16px 20px;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    color:var(--text-strong);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    box-shadow:0 1px 10px rgba(64,56,45,.08);
    flex-shrink:0;
}
.chat-header>span{
    position:absolute;left:50%;transform:translateX(-50%);
    max-width:calc(100% - 260px);
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
    font-size:18px;font-weight:700;
}
.user-info{position:absolute;right:16px;display:flex;align-items:center;gap:10px}
.health-status{
    font-size:14px;padding:4px 10px;border-radius:999px;
    background:rgba(255,255,255,.16);
    color:var(--text);
}
body.light-theme .health-status{
    color:#064e3b;
    border:1px solid rgba(16,185,129,.22);
}

.sidebar-toggle{
    position:fixed;left:0;top:0;z-index:300;
    width:64px;height:var(--header-h);
    border:none;border-bottom:1px solid var(--border);
    background:var(--bg);color:var(--text-strong);
    font-size:24px;transition:left .3s ease,background .2s;
}
body.sidebar-open .sidebar-toggle{left:var(--sidebar-width)}

.sidebar{
    position:fixed;left:calc(-1 * var(--sidebar-width));top:0;z-index:200;
    width:var(--sidebar-width);height:100vh;
    background:var(--panel);color:var(--text);
    border-right:1px solid var(--border);
    padding:100px 8px 12px 12px;
    overflow:hidden;transition:left .3s ease,box-shadow .3s ease;
}
.sidebar.open{left:0;box-shadow:var(--side-shadow)}
.sidebar-brand{
    position:absolute;top:6px;left:12px;z-index:1;
    min-height:58px;padding:6px 8px;border-radius:10px;
    display:flex;align-items:center;background:var(--panel);
}
.sidebar-brand img{
    display:block;height:60px;max-width:190px;width:auto;object-fit:contain;border:none;
    filter:brightness(1.18) contrast(1.22) drop-shadow(0 0 1px rgba(255,255,255,.55)) drop-shadow(0 2px 8px rgba(255,255,255,.08));
}
body.light-theme .sidebar-brand img{
    filter:invert(1) brightness(.92) contrast(1.08) drop-shadow(0 1px 4px rgba(15,23,42,.10));
}
.sidebar-content{
    height:100%;display:flex;flex-direction:column;
    padding:0 8px 82px 0;overflow:hidden;
}
.new-chat-card{
    width:calc(100% - 8px);min-height:48px;margin-bottom:10px;
    padding:0 12px;border:1px solid var(--border);border-radius:8px;
    background:var(--soft);color:var(--text);
    display:flex;align-items:center;flex-shrink:0;
}
.new-chat-card:hover{background:var(--hover)}
.history-label{font-size:13px;color:var(--muted);margin:6px 0 4px 4px;flex-shrink:0}
.history-scroll-area{
    flex:1;overflow-y:auto;padding-right:8px;margin-right:-8px;
    scrollbar-gutter:stable;
}
.history-scroll-area.scroll-locked{overflow-y:scroll}
.history-records{display:flex;flex-direction:column;gap:8px;width:100%}
.history-record{
    position:relative;width:100%;min-height:48px;
    padding:12px 42px 12px 12px;border:none;border-radius:8px;
    background:transparent;color:var(--text);
    display:flex;align-items:center;overflow:visible;
    transition:background .2s,box-shadow .2s;
}
.history-record:hover,.history-record.menu-open{
    background:var(--hover);
    box-shadow:0 8px 18px rgba(0,0,0,.22);
}
.history-record.selected{
    background:var(--active);color:var(--text-strong);
    box-shadow:0 8px 18px rgba(0,0,0,.24);
}
.history-record.selected:hover{filter:brightness(1.04)}
.history-record-title{
    flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.history-more-btn{
    position:absolute;right:8px;top:50%;
    transform:translateY(-50%);
    width:26px;height:26px;line-height:26px;
    border:none;border-radius:6px;background:transparent;color:var(--text);
    font-size:18px;opacity:0;transition:.2s;
}
.history-record:hover .history-more-btn,
.history-record.menu-open .history-more-btn{opacity:1}
.history-more-btn:hover,
.history-record.menu-open .history-more-btn{background:rgba(255,255,255,.15)}
body.light-theme .history-more-btn:hover,
body.light-theme .history-record.menu-open .history-more-btn{background:rgba(64,56,45,.10)}
.history-menu,.sidebar-user-menu{
    position:fixed;z-index:1200;width:118px;padding:6px;
    background:#2f2f2f;border:1px solid var(--border);border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
}
body.light-theme .history-menu,
body.light-theme .sidebar-user-menu{background:#f6f3ed;box-shadow:0 12px 30px rgba(64,56,45,.16)}
.history-menu.drop-down{transform-origin:left top}
.history-menu.drop-up{transform-origin:left bottom}
.history-menu-item,.sidebar-user-menu-item{
    width:100%;padding:9px 10px;border:none;border-radius:8px;
    background:transparent;color:var(--text);font-size:14px;text-align:left;
}
.history-menu-item:hover,.sidebar-user-menu-item:hover{background:var(--active)}
body.light-theme .history-menu-item:hover,
body.light-theme .sidebar-user-menu-item:hover{background:var(--soft-2)}
.history-menu-item.danger,.sidebar-user-menu-item.danger{color:var(--danger)}
.history-menu-item.danger:hover,.sidebar-user-menu-item.danger:hover{background:rgba(255,80,80,.15)}

.sidebar-user-area{
    position:absolute;left:0;bottom:0;width:100%;height:72px;z-index:20;
    border-top:1px solid var(--border);background:var(--panel);padding:10px 12px;
}
.sidebar-user-btn{
    width:100%;height:52px;border:none;border-radius:10px;
    background:transparent;color:var(--text);
    display:flex;align-items:center;gap:10px;padding:0 10px;text-align:left;
}
.sidebar-user-btn:hover{background:var(--soft)}
.sidebar-user-avatar,.profile-avatar{
    border-radius:50%;background:var(--active);color:var(--text-strong);
    display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;
}
.sidebar-user-avatar{width:34px;height:34px;font-size:15px}
.sidebar-user-name{
    flex:1;font-size:14px;color:var(--text-strong);
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}

.chat-messages{
    flex:1;
    min-height:0;
    width:min(92%,860px);
    margin:0 auto;
    padding:20px 16px var(--input-reserve);
    scroll-padding-bottom:var(--input-reserve);
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:16px;
    scrollbar-width:thin;
    scrollbar-color:transparent transparent;
}
.chat-messages:hover,.chat-messages.scrolling{scrollbar-color:var(--scroll) transparent}
.chat-messages::-webkit-scrollbar,
.history-scroll-area::-webkit-scrollbar,
.settings-content::-webkit-scrollbar{width:6px}
.chat-messages::-webkit-scrollbar-track,
.history-scroll-area::-webkit-scrollbar-track,
.settings-content::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb,
.history-scroll-area::-webkit-scrollbar-thumb,
.settings-content::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:3px}
.chat-messages::-webkit-scrollbar-thumb{background:transparent}
.chat-messages:hover::-webkit-scrollbar-thumb,
.chat-messages.scrolling::-webkit-scrollbar-thumb{background:var(--scroll)}

.message{max-width:85%;display:flex}
.ai-message{align-self:flex-start}
.user-message{align-self:flex-end;flex-direction:row-reverse}
.bubble{
    padding:12px 16px;border-radius:18px;line-height:1.6;
    word-break:break-word;overflow-wrap:anywhere;
}
.user-message .bubble{
    background:var(--user-bg);color:var(--text-strong);
    border-bottom-right-radius:6px;
}
.ai-message .bubble{
    background:var(--ai-bg);color:var(--text);
    border-bottom-left-radius:6px;
}
.ai-message .bubble.no-bg{
    background:none;border-radius:0;padding:0;color:var(--text);
}
.loading{color:var(--muted);font-size:14px;padding:8px 16px}
.bubble-suffix{font-size:12px;color:var(--muted);text-align:right;margin-top:4px}

.markdown{font-size:15px;line-height:1.75;margin-bottom:4px;word-break:break-word}
.markdown h1{font-size:20px;margin:16px 0 10px}
.markdown h2{font-size:18px;margin:14px 0 8px}
.markdown h3{font-size:16px;margin:12px 0 6px}
.markdown h4{font-size:15px;margin:10px 0 5px}
.markdown h1,.markdown h2,.markdown h3,.markdown h4{font-weight:700;line-height:1.5;color:var(--text-strong)}
.markdown p{margin:6px 0}
.markdown ul{padding-left:22px;margin:8px 0}
.markdown ol{padding-left:24px;margin:8px 0}
.markdown li{margin:5px 0;line-height:1.7}
.markdown hr{border:none;height:1px;background:rgba(128,128,128,.28);margin:16px 0}
.markdown blockquote{
    margin:10px 0;padding:8px 12px;border-left:3px solid #888;
    background:var(--quote-bg);color:var(--text);border-radius:6px;
}
.markdown strong{font-weight:700;color:var(--text-strong)}
.markdown em{font-style:italic}

.greeting-text{
    position:absolute;left:50%;top:calc(50% - 130px);z-index:5;
    transform:translateX(-50%);
    width:min(92%,780px);text-align:center;pointer-events:none;
    color:var(--text-strong);font-size:24px;font-weight:700;line-height:1.4;
}
.chat-container.chat-active .greeting-text,
.chat-container:not(.start-mode) .greeting-text{display:none}
.chat-container.start-mode .chat-messages{display:none}

.input-area{
    position:absolute;left:50%;bottom:16px;z-index:10;
    transform:translateX(-50%);
    width:min(92%,780px);
}
.chat-container.start-mode .input-area{
    top:50%;bottom:auto;transform:translate(-50%,-50%);
}
.chat-container.chat-active .input-area{animation:inputDropDown .35s ease forwards}
@keyframes inputDropDown{
    from{top:50%;bottom:auto;transform:translate(-50%,-50%)}
    to{top:auto;bottom:16px;transform:translateX(-50%)}
}
.input-wrapper{
    position:relative;
    width:100%;
    min-height:118px;
    border:1px solid var(--border);
    border-radius:28px;
    background:var(--input-bg);
    box-shadow:0 10px 30px rgba(64,56,45,.12);
    overflow:hidden;
    transition:border-color .2s,box-shadow .2s;
}

.input-wrapper:focus-within{
    border-color:#999;
    box-shadow:0 0 0 1px rgba(255,255,255,.12),0 12px 32px rgba(64,56,45,.14);
}
#question-input{
    width:100%;
    min-height:62px;
    max-height:min(176px,26vh);
    margin:0 0 56px 0;
    padding:16px 34px 8px 18px;
    resize:none;
    display:block;
    outline:none;
    overflow-y:hidden;
    scrollbar-width:none;
    border:none;
    border-radius:28px 28px 0 0;
    background:transparent;
    color:var(--text);
    font-size:clamp(14px,1.6vw,16px);
    line-height:1.7;
    box-shadow:none;
    transition:height .15s ease;
}

#question-input::-webkit-scrollbar{
    width:0;
    height:0;
    display:none;
}

.question-scrollbar{
    position:absolute;
    right:14px;
    top:18px;
    bottom:62px;
    z-index:4;
    width:6px;
    border-radius:999px;
    background:transparent;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease;
}

.input-wrapper.has-input-scroll .question-scrollbar{
    opacity:1;
    pointer-events:auto;
}

.question-scrollbar-thumb{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    min-height:28px;
    border-radius:999px;
    background:var(--scroll);
    opacity:.85;
    cursor:pointer;
}

.question-scrollbar-thumb:hover{
    opacity:1;
}
#question-input::placeholder{color:var(--muted)}
.option-buttons{
    position:absolute;left:14px;bottom:12px;z-index:2;
    display:flex;gap:8px;max-width:calc(100% - 110px);
}
.option-btn{
    padding:7px 12px;border-radius:24px;border:1px solid var(--border);
    background:var(--input-bg);color:var(--text);
    font-size:clamp(12px,1.5vw,13px);line-height:1;
    white-space:nowrap;transition:.2s;
}
.option-btn:hover{background:var(--hover);border-color:#999}
.option-btn.active{background:var(--active);border-color:#aaa;color:var(--text-strong)}
#send-btn{
    position:absolute;right:12px;bottom:12px;height:36px;
    padding:0 20px;border:none;border-radius:18px;
    background:var(--send-bg);color:var(--send-text);
    font-size:14px;font-weight:500;transition:.2s;
}
#send-btn:hover{filter:brightness(.94)}
#send-btn:disabled{background:#bdbdbd;color:#555;cursor:not-allowed}

.profile-page,.settings-page,.service-page{
    flex:1;background:var(--bg);color:var(--text);
    display:none;justify-content:center;align-items:center;padding:24px;
}
.profile-card,.settings-card{
    width:min(92%,860px);min-height:360px;height:min(52vh,460px);
    background:var(--card);border:1px solid var(--border);border-radius:18px;
    box-shadow:var(--shadow);
}
.profile-card{
    height:min(76vh,680px);
    padding:24px;
    text-align:left;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    align-items:stretch;
    overflow-y:auto;
}

.profile-header{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:18px;
}

.profile-avatar{
    width:76px;
    height:76px;
    font-size:30px;
    margin-bottom:0;
}

.profile-head-text{
    flex:1;
    min-width:0;
}

.profile-name{
    font-size:20px;
    font-weight:700;
    color:var(--text-strong);
    margin-bottom:6px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

.profile-subtitle{
    font-size:13px;
    color:var(--muted);
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

.profile-info{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:18px;
}

.profile-info-item{
    min-height:58px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:12px;
    background:var(--soft);
}

.profile-info-item span{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:5px;
}

.profile-info-item strong{
    display:block;
    font-size:13px;
    color:var(--text-strong);
    font-weight:600;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
}

.profile-form-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
}

.profile-field{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.profile-field-full{
    grid-column:1 / -1;
}

.profile-field label{
    font-size:13px;
    color:var(--muted);
}

.profile-field input,
.profile-field select,
.profile-field textarea{
    width:100%;
    border:1px solid transparent;
    border-radius:10px;
    background:var(--soft);
    color:var(--text);
    outline:none;
    font-size:14px;
    padding:10px 12px;
}

.profile-field input,
.profile-field select{
    height:42px;
}

.profile-field textarea{
    resize:none;
    line-height:1.6;
}

.profile-field input:focus,
.profile-field select:focus,
.profile-field textarea:focus{
    border-color:#aaa;
    box-shadow:0 0 0 1px rgba(255,255,255,.12);
}

.profile-actions{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    margin-top:18px;
}

.profile-tip{
    margin-right:auto;
    font-size:12px;
    color:var(--muted);
}

.profile-reset-btn,
.profile-save-btn{
    min-width:88px;
    height:38px;
    border:none;
    border-radius:12px;
    font-size:14px;
}

.profile-reset-btn{
    background:var(--soft);
    color:var(--text);
    border:1px solid var(--border);
}

.profile-reset-btn:hover{
    background:var(--hover);
}

.profile-save-btn{
    background:var(--send-bg);
    color:var(--send-text);
}

.profile-save-btn:hover{
    filter:brightness(.94);
}

.profile-save-btn:disabled{
    background:#bdbdbd;
    color:#555;
    cursor:not-allowed;
}
.service-card{
    width:min(92%,860px);
    height:min(76vh,680px);
    padding:24px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    box-shadow:var(--shadow);
    overflow-y:auto;
}

.service-header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    margin-bottom:18px;
}

.service-title{
    font-size:20px;
    font-weight:700;
    color:var(--text-strong);
    margin-bottom:6px;
}

.service-desc{
    font-size:13px;
    color:var(--muted);
    line-height:1.6;
}

.service-section-title{
    font-size:15px;
    font-weight:700;
    color:var(--text-strong);
    margin:16px 0 10px;
}

.service-form-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
}

.service-field{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.service-field-full{
    grid-column:1 / -1;
}

.service-field label{
    font-size:13px;
    color:var(--muted);
}

.service-field input,
.service-field select,
.service-field textarea,
.service-filter-row input,
.service-filter-row select,
.service-item select,
.service-item textarea{
    width:100%;
    border:1px solid transparent;
    border-radius:10px;
    background:var(--soft);
    color:var(--text);
    outline:none;
    font-size:14px;
    padding:10px 12px;
}

.service-field input,
.service-field select,
.service-filter-row input,
.service-filter-row select{
    height:42px;
}

.service-field textarea,
.service-item textarea{
    resize:none;
    line-height:1.6;
}

.service-field input:focus,
.service-field select:focus,
.service-field textarea:focus,
.service-filter-row input:focus,
.service-filter-row select:focus,
.service-item select:focus,
.service-item textarea:focus{
    border-color:#aaa;
    box-shadow:0 0 0 1px rgba(255,255,255,.12);
}

.service-actions{
    display:flex;
    align-items:center;
    justify-content:flex-end;

.service-primary-btn:hover,
.service-secondary-btn:hover,
.service-refresh-btn:hover{

.service-primary-btn:disabled{

.service-item-content{

.settings-card{overflow:hidden;display:flex}

}
.settings-nav-btn:hover,.settings-nav-btn.active{background:var(--active);color:var(--text-strong)}
.settings-content{flex:1;padding:28px 30px;overflow-y:auto;background:var(--card)}
.settings-panel-title{font-size:20px;font-weight:700;color:var(--text-strong);margin-bottom:8px}
.settings-panel-desc{font-size:14px;color:var(--muted);margin-bottom:22px;line-height:1.7}
.theme-options{display:flex;gap:14px;flex-wrap:wrap}

}
.theme-option-btn:hover{background:var(--hover);transform:translateY(-1px)}
.theme-option-btn.active{background:var(--send-bg);border-color:var(--send-bg);color:var(--send-text)}

.modal{
    position:fixed;inset:0;z-index:1000;

}

}

.modal-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px}
.primary-btn{background:#555;color:#fff}
.primary-btn:hover{background:#666}

body.light-theme .primary-btn:hover{background:#273142}
.cancel-btn{background:#e6e6e6;color:#000}
.cancel-btn:hover{background:#f2f2f2}
body.light-theme .cancel-btn{background:#e9e4da;color:#111827}
body.light-theme .cancel-btn:hover{background:#ded8cc}
.register-link,.login-link{margin-top:12px;text-align:right}
.register-link span,.login-link span{display:inline-block;font-size:13px;color:var(--muted);cursor:pointer;padding:2px 4px}
.register-link span:hover,.login-link span:hover{color:var(--text-strong)}
.error-msg{color:var(--danger);font-size:12px;margin-top:4px;min-height:16px}
#login-modal .modal-title,
#register-modal .modal-title{
    margin-bottom:18px;
}
#login-modal .form-item,
#register-modal .form-item{
    margin-bottom:10px;
}
#login-modal .form-item label,
#register-modal .form-item label{
    margin-bottom:5px;
}
#login-modal .modal-btns,
#register-modal .modal-btns{
    margin-top:10px;
}
#login-modal .error-msg,
#register-modal .error-msg{
    margin-top:0;
    min-height:0;
    line-height:1.35;
}
#login-modal .error-msg:not(:empty),
#register-modal .error-msg:not(:empty){
    margin-top:4px;
    min-height:16px;
}

#login-modal .login-floating-item{
    --login-input-h:50px;
    position:relative;
    padding-top:26px;
}

#login-modal .login-floating-item label{
    position:absolute;
    left:12px;
    top:26px;
    height:var(--login-input-h);

    margin:0;
    color:var(--muted);
    font-size:14px;
    line-height:1;
    display:flex;
    align-items:center;
    pointer-events:none;
    transform:none;
    transition:
        top .18s ease,
        left .18s ease,
        height .18s ease,
        font-size .18s ease,

}

#login-modal .login-floating-item input{

    z-index:1;
    height:var(--login-input-h);
    padding:0 12px;
}

#login-modal .login-floating-item input::placeholder{
    color:transparent;
}

#login-modal .login-floating-item:has(input:focus) label,
#login-modal .login-floating-item:has(input:not(:placeholder-shown)) label{

<body class="light-theme">
<div id="toast-message" class="toast-message"></div>

<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <img src="./bbg_logo_with_bomb_icon.png" alt="华工百事通logo">
    </div>

    <div class="sidebar-content">
        <div class="new-chat-card" onclick="createNewChat()">新对话</div>

            <div id="history-list" class="history-records"></div>
        </div>

    <div class="sidebar-user-area">

        <div class="sidebar-user-menu hidden" id="sidebar-user-menu"></div>
    </div>
</aside>

<main class="chat-container start-mode" id="chat-container">
    <header class="chat-header">
        <span id="conversation-title">新对话</span>
        <div class="user-info">
            <span id="health-status" class="health-status">检查服务中...</span>
        </div>
    </header>

    <div id="chat-messages" class="chat-messages"></div>

    <section id="profile-page" class="profile-page">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="profile-avatar">游</div>
                <div class="profile-head-text">
                    <div class="profile-name" id="profile-name">未登录</div>
                    <div class="profile-subtitle" id="profile-basic-line">登录后可完善个人资料</div>
                </div>
            </div>

            <div class="profile-info">
                <div class="profile-info-item">
                    <span>登录状态</span>
                    <strong id="profile-login-status">当前状态：未登录</strong>
                </div>
                <div class="profile-info-item">
                    <span>账号权限</span>
                    <strong id="profile-admin-status">权限：普通用户</strong>
                </div>
                <div class="profile-info-item">
                    <span>最后更新</span>
                    <strong id="profile-updated-at">暂无</strong>

            <div class="profile-form-grid">

                    <input id="profile-birthday" type="date">

                <div class="profile-field">
                    <label for="profile-grade">年级</label>
                    <input id="profile-grade" type="text" placeholder="例如：大二">
                </div>

                <div class="profile-field">
                    <label for="profile-college">学院</label>
                    <input id="profile-college" type="text" placeholder="例如：软件学院">
                </div>

                <div class="profile-field">
                    <label for="profile-major">专业</label>
                    <input id="profile-major" type="text" placeholder="例如：软件工程">
                </div>

                <div class="profile-field">
                    <label for="profile-class-name">班级</label>
                    <input id="profile-class-name" type="text" placeholder="例如：软件工程2401">
                </div>

                <div class="profile-field">
                    <label for="profile-campus">校区</label>
                    <input id="profile-campus" type="text" placeholder="例如：五山校区 / 大学城校区 / 国际校区">

        <div id="feedback-list" class="service-list"></div>

<script>
const BASE_URL = "https://backup.u850688.nyat.app:54767";
const SIDEBAR_WIDTH = 260;
const MIN_CHAT_WIDTH_AFTER_PUSH = 720;
const USERNAME_REG = /^[a-zA-Z0-9_]{3,20}$/;

let isRequesting = false;
let token = localStorage.getItem("token") || "";
let username = localStorage.getItem("username") || "";
let isAdmin = localStorage.getItem("isAdmin") === "true" || localStorage.getItem("admin") === "true";
let currentUserProfile = null;
let conversations = [];
let currentConversation = [];
let currentConversationId = "";
let openedHistoryMenuIndex = null;
let renamingHistoryIndex = null;
let toastTimer = null;
let chatScrollTimer = null;
let lockedHistoryScrollTop = 0;
let questionScrollbarDragging = false;
let questionScrollbarStartY = 0;
let questionScrollbarStartScrollTop = 0;

const $ = (selector) => document.querySelector(selector);
const $$ = (selector) => Array.from(document.querySelectorAll(selector));
const byId = (id) => document.getElementById(id);

function showToast(message) {
    const toast = byId("toast-message");
    if (!toast) return;
    toast.textContent = message;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
}

function setConversationTitle(title) {
    const titleEl = byId("conversation-title");
    if (titleEl) titleEl.innerText = title || "新对话";
}

function escapeHtml(text) {
    return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function applyTheme(themeName, showMessage = false) {
    const safeTheme = themeName === "dark" ? "dark" : "light";
    document.body.classList.toggle("light-theme", safeTheme === "light");
    localStorage.setItem("themeMode", safeTheme);
    updateThemeOptionButtons(safeTheme);
    if (showMessage) showToast(safeTheme === "light" ? "已切换为浅色主题" : "已切换为深色主题");
}

function updateThemeOptionButtons(themeName) {
    $$(".theme-option-btn").forEach(btn => {
        const text = btn.textContent.trim();
        btn.classList.toggle("active",
            (themeName === "light" && text.includes("浅色")) ||
            (themeName === "dark" && text.includes("深色"))
        );
    });
}

function selectThemeOption(themeName) {
    applyTheme(themeName, true);
}

function updateSidebarPushMode() {
    const sidebar = byId("sidebar");
    const isSidebarOpen = sidebar && sidebar.classList.contains("open");
    const canPushChat = window.innerWidth - SIDEBAR_WIDTH >= MIN_CHAT_WIDTH_AFTER_PUSH;
    document.body.classList.toggle("sidebar-push", !!isSidebarOpen && canPushChat);
}

function updateGreeting() {
    const greetingEl = byId("greeting");
    if (!greetingEl) return;

    const hour = new Date().getHours();
    let timeGreeting = "凌晨好";
    if (hour >= 6 && hour < 12) timeGreeting = "上午好";
    else if (hour >= 12 && hour < 14) timeGreeting = "中午好";
    else if (hour >= 14 && hour < 18) timeGreeting = "下午好";
    else if (hour >= 18 && hour < 24) timeGreeting = "晚上好";

    const name = username ? `${username}同学` : "同学";
    greetingEl.textContent = `${timeGreeting}，${name}`;
}

function getAvatarText() {
    const nameSource = currentUserProfile?.displayName || username;
    return token && nameSource ? nameSource.trim().charAt(0).toUpperCase() : "游";
}

function getDisplayName() {
    return token
        ? ((currentUserProfile?.displayName || username || "已登录用户").trim())
        : "未登录";
}

function buildProfileBasicLine(profile = currentUserProfile) {
    if (!token) return "登录后可完善个人资料";

    const parts = [
        profile?.college,
        profile?.major,
        profile?.grade,
        profile?.className,
        profile?.campus
    ].filter(Boolean);

    return parts.length ? parts.join(" · ") : "完善学院、专业、班级、校区等资料";
}

function formatProfileTime(value) {
    if (!value) return "暂无";
    return String(value).replace("T", " ").slice(0, 16);
}

function formatDateTime(value) {
    if (!value) return "暂无";
    return String(value).replace("T", " ").slice(0, 16);
}

function feedbackTypeText(type) {
    const map = {
        BUG: "功能异常",
        SUGGESTION: "功能建议",
        DATA_ERROR: "数据纠错",
        GENERAL: "一般反馈"
    };
    return map[type] || type || "一般反馈";
}

function feedbackStatusText(status) {
    const map = {
        OPEN: "待处理",
        PROCESSING: "处理中",
        CLOSED: "已关闭"
    };
    return map[status] || status || "未知";
}

function contributionStatusText(status) {
    const map = {
        PENDING: "待审核",
        APPROVED: "已通过",
        IGNORED: "已忽略",
        IMPORTED: "已导入"
    };
    return map[status] || status || "未知";
}

function clearUserInfo() {
    token = "";
    username = "";
    isAdmin = false;
    currentUserProfile = null;
    ["token", "username", "isAdmin", "admin", "deepSearchEnabled"].forEach(key => localStorage.removeItem(key));
}

function saveUserInfo() {
    localStorage.setItem("token", token);
    localStorage.setItem("username", username);
    localStorage.setItem("isAdmin", String(isAdmin));
    localStorage.setItem("admin", String(isAdmin));
}

function initUserStatus() {
    const adminBtn = byId("admin-btn");
    if (adminBtn) {
        adminBtn.classList.toggle("admin-hidden", !(token && isAdmin));
        if (!(token && isAdmin)) adminBtn.classList.remove("active");
    }
    updateSidebarUserInfo();
}

function updateSidebarUserInfo() {
    const avatarText = getAvatarText();
    const displayName = getDisplayName();

    const sidebarAvatar = byId("sidebar-user-avatar");
    const sidebarName = byId("sidebar-user-name");
    const profileAvatar = byId("profile-avatar");
    const profileName = byId("profile-name");
    const profileLoginStatus = byId("profile-login-status");
    const profileAdminStatus = byId("profile-admin-status");
    const profileBasicLine = byId("profile-basic-line");
    const profileUpdatedAt = byId("profile-updated-at");

    if (sidebarAvatar) sidebarAvatar.textContent = avatarText;
    if (sidebarName) sidebarName.textContent = displayName;
    if (profileAvatar) profileAvatar.textContent = avatarText;
    if (profileName) profileName.textContent = displayName;
    if (profileLoginStatus) profileLoginStatus.textContent = token ? "当前状态：已登录" : "当前状态：未登录";
    if (profileAdminStatus) profileAdminStatus.textContent = isAdmin ? "权限：管理员" : "权限：普通用户";
    if (profileBasicLine) profileBasicLine.textContent = buildProfileBasicLine();
    if (profileUpdatedAt) profileUpdatedAt.textContent = formatProfileTime(currentUserProfile?.updatedAt);

    renderSidebarUserMenu();
}

function getCurrentThemeModeForProfile() {
    return document.body.classList.contains("light-theme") ? "LIGHT" : "DARK";
}

function normalizeProfile(data = {}) {
    return {
        id: data.id ?? null,
        username: data.username || username || "",
        displayName: data.displayName || "",
        gender: data.gender || "",
        age: data.age ?? "",
        birthday: data.birthday || "",
        grade: data.grade || "",
        college: data.college || "软件学院",
        major: data.major || "",
        className: data.className || "",
        campus: data.campus || "",
        themeMode: data.themeMode || getCurrentThemeModeForProfile(),
        bio: data.bio || "",
        createdAt: data.createdAt || null,
        updatedAt: data.updatedAt || null
    };
}

function setProfileFieldValue(id, value) {
    const el = byId(id);
    if (el) el.value = value ?? "";
}

function renderProfileForm(profileData = {}) {
    currentUserProfile = normalizeProfile(profileData);

    setProfileFieldValue("profile-display-name", currentUserProfile.displayName);
    setProfileFieldValue("profile-gender", currentUserProfile.gender);
    setProfileFieldValue("profile-age", currentUserProfile.age);
    setProfileFieldValue("profile-birthday", currentUserProfile.birthday);
    setProfileFieldValue("profile-grade", currentUserProfile.grade);
    setProfileFieldValue("profile-college", currentUserProfile.college);
    setProfileFieldValue("profile-major", currentUserProfile.major);
    setProfileFieldValue("profile-class-name", currentUserProfile.className);
    setProfileFieldValue("profile-campus", currentUserProfile.campus);
    setProfileFieldValue("profile-theme-mode", currentUserProfile.themeMode);
    setProfileFieldValue("profile-bio", currentUserProfile.bio);

    updateSidebarUserInfo();
}

function getProfileFormPayload() {
    const ageRaw = byId("profile-age")?.value.trim() || "";
    let age = null;

    if (ageRaw) {
        age = Number(ageRaw);
        if (!Number.isInteger(age) || age < 0 || age > 120) {
            throw new Error("年龄必须是 0 到 120 之间的整数");
        }
    }

    return {
        displayName: byId("profile-display-name")?.value.trim() || null,
        gender: byId("profile-gender")?.value || null,
        age,
        birthday: byId("profile-birthday")?.value || null,
        grade: byId("profile-grade")?.value.trim() || null,
        college: byId("profile-college")?.value.trim() || "软件学院",
        major: byId("profile-major")?.value.trim() || null,
        className: byId("profile-class-name")?.value.trim() || null,
        campus: byId("profile-campus")?.value.trim() || null,
        themeMode: byId("profile-theme-mode")?.value || getCurrentThemeModeForProfile(),
        bio: byId("profile-bio")?.value.trim() || null
    };
}

async function loadUserProfile(showMessage = false) {
    if (!token) {
        currentUserProfile = null;
        renderProfileForm({});
        updateSidebarUserInfo();
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/user/profile?token=${encodeURIComponent(token)}`);
        if (!res.ok) throw new Error(`用户资料接口响应失败：${res.status}`);

        const result = await res.json();

        if (result.code !== 200) {
            console.error("读取用户资料失败：", result.msg);
            if (showMessage) showToast(result.msg || "读取用户资料失败");
            return;
        }

        renderProfileForm(result.data || {});

        if (showMessage) showToast("已重新加载个人资料");
    } catch (err) {
        console.error("读取用户资料失败：", err);
        if (showMessage) showToast("读取用户资料失败，请稍后重试");
    }
}

async function saveProfile() {
    if (!token) {
        showToast("请先登录");
        return;
    }

    const saveBtn = byId("profile-save-btn");

    try {
        const payload = getProfileFormPayload();

        if (saveBtn) saveBtn.disabled = true;

        const res = await fetch(`${BASE_URL}/user/profile/update?token=${encodeURIComponent(token)}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error(`保存用户资料接口响应失败：${res.status}`);

        const result = await res.json();

        if (result.code !== 200) {
            showToast(result.msg || "保存失败");
            return;
        }

        renderProfileForm(result.data || payload);

        const themeMode = String((result.data && result.data.themeMode) || payload.themeMode || "").toUpperCase();
        if (themeMode === "LIGHT" || themeMode === "DARK") {
            applyTheme(themeMode === "DARK" ? "dark" : "light", false);
        }

        updateGreeting();
        showToast("个人资料已保存");
    } catch (err) {
        console.error("保存个人资料失败：", err);
        showToast(err.message || "保存失败，请稍后重试");
    } finally {
        if (saveBtn) saveBtn.disabled = false;
    }
}

function resetProfileForm() {
    loadUserProfile(true);
}

function createMenuButton(text, className, handler) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = className;
    btn.textContent = text;
    btn.onclick = handler;
    return btn;
}

function renderSidebarUserMenu() {
    const menu = byId("sidebar-user-menu");
    if (!menu) return;
    menu.innerHTML = "";

    if (!token) {
        menu.appendChild(createMenuButton("登录", "sidebar-user-menu-item", (e) => {
            e.stopPropagation();
            closeUserMenu();
            showLoginModal();
        }));
        return;
    }

    menu.appendChild(createMenuButton("个人信息", "sidebar-user-menu-item", (e) => {
        e.stopPropagation();
        closeUserMenu();
        openProfilePage();
    }));

    menu.appendChild(createMenuButton(isAdmin ? "查看反馈" : "反馈", "sidebar-user-menu-item", (e) => {
        e.stopPropagation();
        closeUserMenu();
        openFeedbackPage();
    }));

    menu.appendChild(createMenuButton(isAdmin ? "查看贡献" : "贡献", "sidebar-user-menu-item", (e) => {
        e.stopPropagation();
        closeUserMenu();
        openContributionPage();
    }));

    menu.appendChild(createMenuButton("设置", "sidebar-user-menu-item", (e) => {
        e.stopPropagation();
        closeUserMenu();
        openSettingsPage();
    }));

    menu.appendChild(createMenuButton("退出登录", "sidebar-user-menu-item danger", (e) => {
        e.stopPropagation();
        closeUserMenu();
        logout();
    }));
}

function setSidebarUserMenuPosition(menu) {
    const sidebar = byId("sidebar");
    const userBtn = $(".sidebar-user-btn");
    if (!menu || !userBtn) return;

    const btnRect = userBtn.getBoundingClientRect();
    const sidebarRect = sidebar ? sidebar.getBoundingClientRect() : { left: 0, top: 0 };
    const menuWidth = menu.offsetWidth || 118;
    const menuHeight = menu.offsetHeight || 96;
    const gap = 6;

    let left = Math.max(sidebarRect.left + 12, btnRect.right - menuWidth);
    if (left + menuWidth + gap > window.innerWidth) {
        left = Math.max(gap, window.innerWidth - menuWidth - gap);
    }

    let top = Math.max(sidebarRect.top + gap, btnRect.top - menuHeight - gap);
    menu.style.left = `${left}px`;
    menu.style.top = `${top}px`;
}

function toggleUserMenu(event) {
    if (event) event.stopPropagation();

    const menu = byId("sidebar-user-menu");
    if (!menu) return;

    const isUserMenuOpen = !menu.classList.contains("hidden");
    const isHistoryMenuOpen = openedHistoryMenuIndex !== null || !!$(".history-menu");

    if (isHistoryMenuOpen) {
        closeHistoryMenus();
        return;
    }

    if (isUserMenuOpen) {
        closeUserMenu();
        return;
    }

    menu.style.visibility = "hidden";
    menu.classList.remove("hidden");
    setSidebarUserMenuPosition(menu);
    menu.style.visibility = "";
}

function closeUserMenu() {
    const menu = byId("sidebar-user-menu");
    if (!menu) return;
    menu.classList.add("hidden");
    menu.style.visibility = "";
}

function hideAuxiliaryPages() {
    ["profile-page", "settings-page", "feedback-page", "contribution-page"].forEach(id => {
        const page = byId(id);
        if (page) page.style.display = "none";
    });
}

function showChatView() {
    const chatMessages = byId("chat-messages");
    const inputArea = $(".input-area");

    hideAuxiliaryPages();

    if (chatMessages) chatMessages.style.display = "";
    if (inputArea) inputArea.style.display = "";
}

function openAuxiliaryPage(pageId, title) {
    closeUserMenu();
    closeHistoryMenus();

    const chatContainer = byId("chat-container");
    const chatMessages = byId("chat-messages");
    const inputArea = $(".input-area");

    if (chatMessages) chatMessages.style.display = "none";
    if (inputArea) inputArea.style.display = "none";

    hideAuxiliaryPages();

    const page = byId(pageId);
    if (page) page.style.display = "flex";

    if (chatContainer) chatContainer.classList.remove("start-mode", "chat-active");
    setConversationTitle(title);
}

function openProfilePage(event) {
    if (event) event.stopPropagation();
    openAuxiliaryPage("profile-page", "个人信息");
    updateSidebarUserInfo();
    loadUserProfile();
}

function closeProfilePage(restoreChat = true) {
    const profilePage = byId("profile-page");
    if (profilePage) profilePage.style.display = "none";
    if (restoreChat) showChatView();
}

function openSettingsPage(event) {
    if (event) event.stopPropagation();
    openAuxiliaryPage("settings-page", "设置");
}

function closeSettingsPage(restoreChat = true) {
    const settingsPage = byId("settings-page");
    if (settingsPage) settingsPage.style.display = "none";
    if (restoreChat) showChatView();
}

function openFeedbackPage(event) {
    if (event) event.stopPropagation();

    if (!token) {
        showToast("请先登录");
        showLoginModal();
        return;
    }

    openAuxiliaryPage("feedback-page", isAdmin ? "查看反馈" : "反馈");

    const userPanel = byId("feedback-user-panel");
    const pageTitle = byId("feedback-page-title");

async function sendQuestion() {
    const input = byId("question-input");
    const btn = byId("send-btn");
    const deepBtn = byId("deep-btn");
    const adminBtn = byId("admin-btn");
    const chat = byId("chat-messages");
    const chatContainer = byId("chat-container");
    if (!input || !btn || !deepBtn || !adminBtn || !chat || !chatContainer) return;

    const q = input.value.trim();
    if (!q || isRequesting) return;

    showChatView();

    if (chatContainer.classList.contains("start-mode")) {
        chatContainer.classList.remove("start-mode");
        chatContainer.classList.add("chat-active");
    }

    input.placeholder = "请输入你的问题";
    currentConversation.push({ role: "user", content: q });

    isRequesting = true;
    btn.disabled = true;
    input.disabled = true;
    input.value = "";
    resetQuestionInputHeight();

    const isDeep = deepBtn.classList.contains("active");
    const isAdminMode = isAdmin && adminBtn.classList.contains("active");

    appendUserMessage(q);

    const loadingId = `loading-${Date.now()}`;
    let loadingText = isDeep ? "深度思考中......" : "AI 思考中......";
    if (isAdminMode) loadingText = `管理员模式 - ${loadingText}`;
    chat.insertAdjacentHTML("beforeend", `<div id="${loadingId}" class="loading">${loadingText}</div>`);
    scrollChatToBottom();

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), isAdminMode ? 45000 : 20000);

    try {
        const params = new URLSearchParams();
        params.set("question", q);
        if (isDeep) params.set("deep", "true");
        if (isAdminMode) params.set("admin", "true");
        if (token) params.set("token", token);
        if (token && currentConversationId && !isAdminMode) params.set("conversationId", currentConversationId);

        const res = await fetch(`${BASE_URL}/question/ask?${params.toString()}`, {
            signal: ctrl.signal,
            method: "GET",
            headers: { "Accept": "application/json" }
        });

        clearTimeout(timer);
        if (!res.ok) throw new Error(`请求失败：${res.status} ${res.statusText}`);

        const result = await res.json();
        byId(loadingId)?.remove();

        let answer = "";
        if (result.code === 200) {
            if (result.data && typeof result.data === "object") {
                answer = result.data.answer || "暂无相关回答，可简化问题重试";
                if (token && !isAdminMode && result.data.conversationId) {
                    const isFirstBackendConversationId = !currentConversationId;
                    currentConversationId = result.data.conversationId;
                    if (isFirstBackendConversationId) await updateConversationTitle(currentConversationId, q);
                }
            } else {
                answer = result.data || "暂无相关回答，可简化问题重试";
            }
        } else {
            answer = result.msg || "请求失败，请重试";
        }

        appendAiMessage(answer);
        currentConversation.push({ role: "assistant", content: String(answer) });
        if (token) await loadUserHistory();
    } catch (err) {
        clearTimeout(timer);
        byId(loadingId)?.remove();

        const msg = err.name === "AbortError"
            ? "请求超时，请稍后重试"
            : `请求失败：${err.message}`;

        appendAiMessage(msg);
        console.error("发送问题失败：", err);
    } finally {
        isRequesting = false;
        btn.disabled = false;
        input.disabled = false;
        input.focus();
        scrollChatToBottom();
    }
}

async function confirmRenameConversation() {
    const index = renamingHistoryIndex;
    const data = conversations[index];
    const input = byId("rename-title-input");
    const err = byId("rename-title-err");
    if (!input || !err) return;

    if (!token) {
        alert("请先登录");
        return;
    }
    if (!data || !data.conversationId) {
        err.textContent = "未找到该历史记录";
        return;
    }

    const title = input.value.trim();
    if (!title) {
        err.textContent = "标题不能为空";
        input.focus();
        return;
    }
    if (title.length > 50) {
        err.textContent = "标题不能超过 50 个字符";
        input.focus();
        return;
    }

    try {
        const params = new URLSearchParams({ token, conversationId: data.conversationId, title });
        const res = await fetch(`${BASE_URL}/conversation/title?${params.toString()}`, { method: "POST" });
        if (!res.ok) throw new Error(`重命名接口响应失败：${res.status}`);

        const result = await res.json();
        if (result.code !== 200) {
            err.textContent = result.msg || "重命名失败";
            return;
        }

        const historyScrollArea = $(".history-scroll-area");
        const keepTop = historyScrollArea ? historyScrollArea.scrollTop : 0;

        data.title = title;
        if (data.conversationId === currentConversationId) setConversationTitle(title);

        const modal = byId("rename-modal");
        if (modal) modal.classList.add("hidden");

        renamingHistoryIndex = null;
        closeHistoryMenus();

function validateAccount(usernameVal, passwordVal, prefix) {
    let hasError = false;
    const usernameErr = byId(`${prefix}-username-err`);
    const passwordErr = byId(`${prefix}-password-err`);

    if (!usernameVal) {
        usernameErr.textContent = "请输入用户名";
        hasError = true;
    } else if (!USERNAME_REG.test(usernameVal)) {
        usernameErr.textContent = "用户名只能包含英文、数字、下划线，长度3-20位";
        hasError = true;
    }

    if (!passwordVal) {
        passwordErr.textContent = "请输入密码";
        hasError = true;
    } else if (passwordVal.length < 6) {
        passwordErr.textContent = "密码长度至少6位";
        hasError = true;
    }

    return !hasError;
}

async function doLogin() {
    const usernameEl = byId("login-username");
    const passwordEl = byId("login-password");
    if (!usernameEl || !passwordEl) return;

    const usernameVal = usernameEl.value.trim();
    const passwordVal = passwordEl.value.trim();

    clearLoginErrors();
    if (!validateAccount(usernameVal, passwordVal, "login")) return;

    try {
        const res = await fetch(`${BASE_URL}/user/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({ username: usernameVal, password: passwordVal })
        });

        if (!res.ok) throw new Error(`登录接口响应失败：${res.status}`);
        const result = await res.json();

        if (result.code !== 200) {
            byId("login-err").textContent = result.msg || "登录失败，请重试";
            return;
        }

        token = result.data?.token || "";
        username = result.data?.username || usernameVal;
        isAdmin = result.data?.admin === true;
        saveUserInfo();

        conversations = [];
        currentConversation = [];
        currentConversationId = "";

        hideLoginModal();
        await loadUserProfile(false);
        initUserStatus();
        updateGreeting();
        await loadUserHistory();

        console.error("登录请求失败：", err);
        byId("login-err").textContent = "网络异常或服务未响应，请重试";
    }

function setHistoryMenuDirection(recordEl, menu) {
    const sidebar = byId("sidebar");
    const userArea = $(".sidebar-user-area");
    const scrollArea = recordEl.closest(".history-scroll-area");
    const moreBtn = recordEl.querySelector(".history-more-btn");

    const btnRect = moreBtn ? moreBtn.getBoundingClientRect() : recordEl.getBoundingClientRect();
    const sidebarRect = sidebar ? sidebar.getBoundingClientRect() : { left: 0, top: 0, bottom: window.innerHeight };
    const userAreaRect = userArea ? userArea.getBoundingClientRect() : null;
    const scrollAreaRect = scrollArea ? scrollArea.getBoundingClientRect() : null;

    const menuWidth = menu.offsetWidth || 118;
    const menuHeight = menu.offsetHeight || 104;
    const gap = 8;

    let left = btnRect.left;
    if (left + menuWidth + gap > window.innerWidth) {
        left = Math.max(gap, window.innerWidth - menuWidth - gap);
    }

    const bottomLimit = Math.min(
        userAreaRect ? userAreaRect.top : window.innerHeight,
        scrollAreaRect ? scrollAreaRect.bottom : window.innerHeight,
        window.innerHeight - gap
    );
    const topLimit = Math.max(
        scrollAreaRect ? scrollAreaRect.top : sidebarRect.top,
        sidebarRect.top,
        gap
    );

    const downTop = btnRect.bottom + gap;
    const upTop = btnRect.top - menuHeight - gap;
    const enoughBelow = downTop + menuHeight <= bottomLimit;
    const enoughAbove = upTop >= topLimit;

    menu.classList.remove("drop-down", "drop-up");
    menu.style.left = `${left}px`;

    if (!enoughBelow && enoughAbove) {
        menu.classList.add("drop-up");
        menu.style.top = `${upTop}px`;
    } else {
        menu.classList.add("drop-down");
        menu.style.top = `${Math.max(topLimit, Math.min(downTop, bottomLimit - menuHeight))}px`;
    }
}

function toggleHistoryMenu(index, recordEl) {
    const userMenu = byId("sidebar-user-menu");
    const isUserMenuOpen = userMenu && !userMenu.classList.contains("hidden");

}

async function deleteHistoryConversation(index) {
    const data = conversations[index];

    if (!token) {
        alert("请先登录");
        return;
    }
    if (!data || !data.conversationId) {
        alert("未找到该历史记录");
        return;
    }

    if (!confirm(`确定要删除「${data.title || "新对话"}」吗？`)) {
        closeHistoryMenus();
        return;
    }

    try {
        const params = new URLSearchParams({ token, conversationId: data.conversationId });
        const res = await fetch(`${BASE_URL}/conversation/archive?${params.toString()}`, { method: "POST" });
        if (!res.ok) throw new Error(`删除接口响应失败：${res.status}`);

        const result = await res.json();
        if (result.code !== 200) {
            alert(result.msg || "删除失败");
            return;
        }

        closeHistoryMenus();

        if (currentConversationId === data.conversationId) {
            createNewChat(false);
        }

        await loadUserHistory();
    } catch (err) {
        console.error("删除历史记录失败：", err);
        alert("删除失败，请稍后重试");
    }
}

async function loadUserHistory() {
    if (!token) {
        conversations = [];
        renderHistoryList();
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/conversation/list?token=${encodeURIComponent(token)}`);
        if (!res.ok) throw new Error(`历史记录接口响应失败：${res.status}`);

        const result = await res.json();

        if (result.code === 200 && Array.isArray(result.data)) {
            const rawConversations = result.data.map(item => ({
                id: item.conversationId,
                conversationId: item.conversationId,
                title: item.title || "新对话",
                messages: []
            }));

            conversations = await filterEmptyNewConversations(rawConversations);
        } else {
            conversations = [];
            console.error("读取历史记录失败：", result.msg);
        }

        renderHistoryList();
    } catch (err) {
        console.error("读取历史记录失败：", err);
    }
}

async function filterEmptyNewConversations(list) {
    const checkedList = await Promise.all(list.map(async item => {
        const title = String(item.title || "").trim();

        if (title !== "新对话") return item;
        if (!item.conversationId) return null;
        if (item.conversationId === currentConversationId) return item;

        try {
            const res = await fetch(
                `${BASE_URL}/conversation/messages?token=${encodeURIComponent(token)}&conversationId=${encodeURIComponent(item.conversationId)}`
            );

            if (!res.ok) return item;

            const result = await res.json();

            if (result.code === 200 && Array.isArray(result.data) && result.data.length === 0) {
                return null;
            }

            return item;
        } catch (err) {
            console.warn("检查空新对话失败，保留该历史记录：", err);
            return item;
        }
    }));

    return checkedList.filter(Boolean);
}

async function openConversation(index) {
    if (!token) {
        alert("请先登录");
        return;
    }

    hideAuxiliaryPages();
    closeHistoryMenus();

    const data = conversations[index];
    if (!data || !data.conversationId) return;

    try {
        const res = await fetch(
            `${BASE_URL}/conversation/messages?token=${encodeURIComponent(token)}&conversationId=${encodeURIComponent(data.conversationId)}`
        );
        if (!res.ok) throw new Error(`历史详情接口响应失败：${res.status}`);

        const result = await res.json();
        if (result.code !== 200 || !Array.isArray(result.data)) {
            alert(result.msg || "读取历史对话失败");
            return;
        }

        const chat = byId("chat-messages");
        const chatContainer = byId("chat-container");
        const input = byId("question-input");

        if (chat) chat.innerHTML = "";
        currentConversation = result.data.map(msg => {
            const role = msg.role === "USER" ? "user" : "assistant";
            const content = msg.content || "";
            if (role === "user") appendUserMessage(content);
            else appendAiMessage(content);
            return { role, content };
        });

        currentConversationId = data.conversationId;

        if (chatContainer) {
            chatContainer.classList.remove("start-mode");
            chatContainer.classList.add("chat-active");
        }

        if (input) input.placeholder = "请输入你的问题";
        setConversationTitle(data.title || "新对话");
        renderHistoryList();
        scrollChatToBottom();
    } catch (err) {
        console.error("拉取对话档案失败：", err);
        alert("读取历史对话失败，请稍后重试");
    }
}

async function updateConversationTitle(conversationId, title) {

        const params = new URLSearchParams({ token, conversationId, title });
        const res = await fetch(`${BASE_URL}/conversation/title?${params.toString()}`, { method: "POST" });

function updateChatBottomReserve() {
    const chatContainer = byId("chat-container");
    const inputArea = $(".input-area");

    const isMobile = window.innerWidth <= 600;
    const baseReserve = isMobile ? 130 : 170;

    if (!chatContainer || !inputArea || chatContainer.classList.contains("start-mode")) {
        document.documentElement.style.setProperty("--input-reserve", `${baseReserve}px`);
        return;
    }

    const inputAreaHeight = inputArea.getBoundingClientRect().height;
    const bottomGap = isMobile ? 10 : 16;
    const extraSafeGap = isMobile ? 24 : 36;

    const reserve = Math.max(
        baseReserve,
        Math.ceil(inputAreaHeight + bottomGap + extraSafeGap)
    );

    document.documentElement.style.setProperty("--input-reserve", `${reserve}px`);
}

function updateQuestionInputScrollbar() {
    const input = byId("question-input");
    const wrapper = input ? input.closest(".input-wrapper") : null;
    const track = byId("question-scrollbar");
    const thumb = byId("question-scrollbar-thumb");

    if (!input || !wrapper || !track || !thumb) return;

    const hasScroll = input.scrollHeight > input.clientHeight + 1;

    wrapper.classList.toggle("has-input-scroll", hasScroll);
    input.classList.toggle("has-scroll", hasScroll);

    if (!hasScroll) {
        thumb.style.height = "";
        thumb.style.transform = "translateY(0)";
        return;
    }

    const trackHeight = track.clientHeight;
    const maxScrollTop = input.scrollHeight - input.clientHeight;

    const thumbHeight = Math.max(
        28,
        Math.floor(trackHeight * input.clientHeight / input.scrollHeight)
    );

    const maxThumbTop = Math.max(0, trackHeight - thumbHeight);
    const thumbTop = maxScrollTop > 0
        ? Math.round((input.scrollTop / maxScrollTop) * maxThumbTop)
        : 0;

    thumb.style.height = `${thumbHeight}px`;
    thumb.style.transform = `translateY(${thumbTop}px)`;
}

function setupQuestionScrollbarDrag() {
    const input = byId("question-input");
    const track = byId("question-scrollbar");
    const thumb = byId("question-scrollbar-thumb");

    if (!input || !track || !thumb) return;

    function getClientY(event) {
        return event.touches ? event.touches[0].clientY : event.clientY;
    }

    function startDrag(event) {
        if (!input.classList.contains("has-scroll")) return;

        event.preventDefault();
        questionScrollbarDragging = true;
        questionScrollbarStartY = getClientY(event);
        questionScrollbarStartScrollTop = input.scrollTop;
        document.body.style.userSelect = "none";
    }

    function moveDrag(event) {
        if (!questionScrollbarDragging) return;

        event.preventDefault();

        const trackHeight = track.clientHeight;
        const thumbHeight = thumb.offsetHeight;
        const maxThumbTop = Math.max(1, trackHeight - thumbHeight);
        const maxScrollTop = Math.max(1, input.scrollHeight - input.clientHeight);

        const deltaY = getClientY(event) - questionScrollbarStartY;
        const deltaScroll = deltaY / maxThumbTop * maxScrollTop;

        input.scrollTop = questionScrollbarStartScrollTop + deltaScroll;
        updateQuestionInputScrollbar();
    }

    function endDrag() {
        if (!questionScrollbarDragging) return;

        questionScrollbarDragging = false;
        document.body.style.userSelect = "";
    }

    thumb.addEventListener("mousedown", startDrag);
    thumb.addEventListener("touchstart", startDrag, { passive:false });

    track.addEventListener("mousedown", (event) => {
        if (event.target === thumb || !input.classList.contains("has-scroll")) return;

        event.preventDefault();

        const rect = track.getBoundingClientRect();
        const thumbHeight = thumb.offsetHeight;
        const maxThumbTop = Math.max(1, track.clientHeight - thumbHeight);
        const maxScrollTop = Math.max(1, input.scrollHeight - input.clientHeight);

        const targetTop = Math.max(
            0,
            Math.min(event.clientY - rect.top - thumbHeight / 2, maxThumbTop)
        );

        input.scrollTop = targetTop / maxThumbTop * maxScrollTop;
        updateQuestionInputScrollbar();
    });

    document.addEventListener("mousemove", moveDrag);
    document.addEventListener("mouseup", endDrag);
    document.addEventListener("touchmove", moveDrag, { passive:false });
    document.addEventListener("touchend", endDrag);
}

function resizeQuestionInput(keepCaretVisible = false) {
    const input = byId("question-input");
    if (!input) return;

    const oldScrollTop = input.scrollTop;
    const isTypingAtEnd =
        keepCaretVisible &&
        document.activeElement === input &&
        input.selectionStart === input.value.length &&
        input.selectionEnd === input.value.length;

    input.style.height = "auto";

    const style = window.getComputedStyle(input);
    const minHeight = parseFloat(style.minHeight) || 84;
    const maxHeight = parseFloat(style.maxHeight) || window.innerHeight * 0.34;

    const hasScroll = input.scrollHeight > maxHeight + 1;
    const nextHeight = Math.max(minHeight, Math.min(input.scrollHeight, maxHeight));

    input.style.height = `${nextHeight}px`;
    input.style.overflowY = hasScroll ? "auto" : "hidden";

    if (hasScroll) {
        input.scrollTop = isTypingAtEnd ? input.scrollHeight : oldScrollTop;
    } else {
        input.scrollTop = 0;
    }

    updateChatBottomReserve();
    updateQuestionInputScrollbar();
}

function formatAnswerWithSuffix(answerText) {
    const suffixes = [
        "（知识库信息）",
        "【提示：数据库中没有相关内容，此内容为 AI 自动生成。】",
        "(来自当前对话上传文件)",
        "(来自用户全局知识库)"
    ];

    let mainText = String(answerText || "");
    let detectedSuffix = "";

    for (const suffix of suffixes) {
        if (mainText.endsWith(suffix)) {
            mainText = mainText.slice(0, -suffix.length).trim();
            detectedSuffix = suffix;
            break;
        }
    }

    return { text: mainText, suffix: detectedSuffix };
}

function renderMarkdownToHtml(mdText) {
    if (!mdText) return `<div class="markdown"></div>`;

    const lines = String(mdText)
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .split("\n");

    let html = "";
    let inUl = false;
    let inOl = false;

    function closeLists() {
        if (inUl) {
            html += "</ul>";
            inUl = false;
        }
        if (inOl) {
            html += "</ol>";
            inOl = false;
        }
    }

    function parseInline(text) {
        let safe = escapeHtml(text);
        safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        safe = safe.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, "$1<em>$2</em>");
        return safe;
    }

    lines.forEach(rawLine => {
        const line = rawLine.trim();

        if (!line) {
            closeLists();
            return;
        }

        if (/^(-{3,}|\*{3,}|_{3,})$/.test(line)) {
            closeLists();
            html += "<hr>";
            return;
        }

        if (/^####\s*/.test(line)) {
            closeLists();
            html += `<h4>${parseInline(line.replace(/^####\s*/, ""))}</h4>`;
            return;
        }

        if (/^###\s+/.test(line)) {
            closeLists();
            html += `<h3>${parseInline(line.replace(/^###\s+/, ""))}</h3>`;
            return;
        }

        if (/^##\s+/.test(line)) {
            closeLists();
            html += `<h2>${parseInline(line.replace(/^##\s+/, ""))}</h2>`;
            return;
        }

        if (/^#\s+/.test(line)) {
            closeLists();
            html += `<h1>${parseInline(line.replace(/^#\s+/, ""))}</h1>`;
            return;
        }

        if (/^>\s?/.test(line)) {
            closeLists();
            html += `<blockquote>${parseInline(line.replace(/^>\s?/, ""))}</blockquote>`;
            return;
        }

        if (/^\d+\.\s+/.test(line)) {
            if (inUl) {
                html += "</ul>";
                inUl = false;
            }
            if (!inOl) {
                html += "<ol>";
                inOl = true;
            }
            html += `<li>${parseInline(line.replace(/^\d+\.\s+/, ""))}</li>`;
            return;
        }

        if (/^[-*•]\s+/.test(line)) {
            if (inOl) {
                html += "</ol>";
                inOl = false;
            }
            if (!inUl) {
                html += "<ul>";
                inUl = true;
            }
            html += `<li>${parseInline(line.replace(/^[-*•]\s+/, ""))}</li>`;
            return;
        }

        closeLists();
        html += `<p>${parseInline(line)}</p>`;
    });

    closeLists();
    return `<div class="markdown">${html}</div>`;
}

function setupEvents() {
    const chat = byId("chat-messages");
    if (chat) {
        chat.addEventListener("scroll", () => {
            chat.classList.add("scrolling");
            clearTimeout(chatScrollTimer);
            chatScrollTimer = setTimeout(() => chat.classList.remove("scrolling"), 800);
        });
    }

    const historyScrollArea = $(".history-scroll-area");
    if (historyScrollArea) {
        historyScrollArea.addEventListener("wheel", (event) => {
            if (historyScrollArea.classList.contains("scroll-locked")) event.preventDefault();
        }, { passive: false });

        historyScrollArea.addEventListener("touchmove", (event) => {
            if (historyScrollArea.classList.contains("scroll-locked")) event.preventDefault();
        }, { passive: false });

        historyScrollArea.addEventListener("scroll", () => {
            if (historyScrollArea.classList.contains("scroll-locked")) {
                historyScrollArea.scrollTop = lockedHistoryScrollTop;
            }
        });
    }

    const input = byId("question-input");
    if (input) {
        input.addEventListener("input", handleQuestionInput);
        input.addEventListener("scroll", updateQuestionInputScrollbar);

        input.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey && !event.isComposing) {
                event.preventDefault();
                sendQuestion();
            }
        });

        resizeQuestionInput();
        setupQuestionScrollbarDrag();
    }

    const renameInput = byId("rename-title-input");
    if (renameInput) {
        renameInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.isComposing) {
                event.preventDefault();
                confirmRenameConversation();
            }
            if (event.key === "Escape") {
                event.preventDefault();
                hideRenameModal();
            }
        });
    }

    [["login", doLogin], ["register", doRegister]].forEach(([prefix, handler]) => {
        [`${prefix}-username`, `${prefix}-password`].forEach(id => {
            const el = byId(id);
            if (!el) return;

            el.addEventListener("input", () => {
                clearAccountErrorsOnTyping(prefix);
            });

            el.addEventListener("keydown", (event) => {
                const modal = byId(`${prefix}-modal`);
                if (event.key === "Enter" && !event.isComposing && modal && !modal.classList.contains("hidden")) {
                    event.preventDefault();
                    handler();
                }
            });
        });
    });

    document.addEventListener("click", (event) => {
        const sidebar = byId("sidebar");
        const clickedHistoryMenu = event.target.closest(".history-menu");
        const clickedHistoryMoreBtn = event.target.closest(".history-more-btn");
        const clickedSidebarUserMenu = event.target.closest(".sidebar-user-menu");
        const clickedSidebarUserBtn = event.target.closest(".sidebar-user-btn");
        const clickedInsideSidebar = sidebar && sidebar.contains(event.target);

        if (clickedHistoryMenu || clickedHistoryMoreBtn || clickedSidebarUserMenu || clickedSidebarUserBtn) return;

        if (clickedInsideSidebar) {
            closeHistoryMenus();
            closeUserMenu();
            return;
        }

        closeHistoryMenus();
        closeUserMenu();
    });

    window.addEventListener("resize", () => {
        updateSidebarPushMode();
        closeHistoryMenus();
        closeUserMenu();
        resizeQuestionInput();
        updateChatBottomReserve();
        updateQuestionInputScrollbar();
    });
}

function initPage() {
    applyTheme(localStorage.getItem("themeMode") || "light", false);

    const deepBtn = byId("deep-btn");
    if (deepBtn) deepBtn.classList.toggle("active", localStorage.getItem("deepSearchEnabled") === "true");

    setupEvents();
    initUserStatus();
    updateGreeting();
    renderHistoryList();
    updateSidebarPushMode();
    updateChatBottomReserve();
    checkBackendHealth();
    setInterval(checkBackendHealth, 30000);

    if (token) checkTokenValid();
}

document.addEventListener("DOMContentLoaded", initPage);
</script>
</body>
