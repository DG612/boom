<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华南理工校园百事通</title>
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            padding: 20px;
            background: #121212;
            color: #e0e0e0;
        }

        .chat-container {
            width: 100vw;
            height: 100vh;
            background: #1e1e1e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        .chat-header {
            height:72px;
            padding: 16px 20px;
            background: #121212;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .chat-header > span {
            position:absolute;
            left:50%;
            transform:translateX(-50%);
        }

        .user-info {
            position:absolute;
            right:20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .health-status {
            font-size: 14px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
        }

        .chat-messages {
            flex: 1;
            width: min(62%, 860px);
            margin: 0 auto;
            padding: 20px 16px 110px 0; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            display: flex;
        }

        .ai-message {
            align-self: flex-start;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .ai-message .bubble {
            background: #f1f3f4;
            color: #e0e0e0;
            border-bottom-left-radius: 6px;
        }

        .user-message .bubble {
            background: #3a3a3a;
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .input-area {
            position: absolute;
            left: 50%;
            bottom: 16px;
            transform: translateX(-50%);
            width: min(58%, 780px);
            padding: 0;
            border: none;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
            background: transparent;
            box-shadow: none;
        }

        /* 初始状态：输入框居中 */
        .chat-container.start-mode .input-area{
            top:50%;
            bottom:auto;
            transform:translate(-50%,-50%);
            width:min(58%, 780px);
        }

        .chat-container.chat-active .input-area {
            animation: inputDropDown 0.35s ease forwards;
        }

        @keyframes inputDropDown {
            from {
                top: 50%;
                bottom: auto;
                transform: translate(-50%, -50%);
            }
            to {
                top: auto;
                bottom: 16px;
                transform: translateX(-50%);
            }
        }

        /* 初始状态隐藏消息区 */
        .chat-container.start-mode .chat-messages{
            display:none;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        #question-input {
            width: 100%;
            padding: 12px 92px 12px 15px;
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 24px;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            outline: none;
            font-size: 14px;
            line-height: 22px;
            transition: border 0.2s;
            display: block;
        }

        #question-input:focus {
            border-color: #7f39fb;
        }

        .option-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-start;
        }

        .option-btn {
            padding: 7px 12px;
            border-radius: 24px;
            border: 1px solid #555;
            background: #2a2a2a;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 13px;
            line-height: 1;
            transition: background 0.2s, border-color 0.2s;
        }

        .option-btn.active {
            background: #6200ee;
            border-color: #6200ee;
            color: #fff;
        }

        .option-btn:hover {
            border-color: #7f39fb;
        }

        .admin-hidden {
            display: none;
        }

        #send-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            height: 34px;
            padding: 0 18px;
            background: #6200ee;
            color: #fff;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #7f39fb;
        }

        #send-btn:disabled {
            background: #a0cfff;
            cursor: not-allowed;
        }

        .loading {
            color: #999;
            font-size: 14px;
            padding: 8px 16px;
        }

        /* 登录注册弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1f1f1f;
            color: #e0e0e0;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-item {
            margin-bottom: 16px;
        }

        .form-item label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #333;
        }

        .form-item input {
            width: 100%;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            background: #3a3a3a;
            color: #e0e0e0;
        }

        .form-item input::placeholder {
            color: #b0b0b0;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .primary-btn {
            background: #6200ee;
            color: #fff;
        }

        .cancel-btn {
            background: #666666;
            color: #e0e0e0;
        }

        .register-link {
            margin-top: 12px;
            text-align: right;
        }

        .register-link span {
            display: inline-block;
            font-size: 13px;
            color: #999;
            cursor: pointer;
            padding: 2px 4px;
        }

        .register-link span:hover {
            color: #d0d0d0;
        }

        .login-link {
            margin-top: 12px;
            text-align: right;
        }

        .login-link span {
            display: inline-block;
            font-size: 13px;
            color: #999;
            cursor: pointer;
            padding: 2px 4px;
        }

        .login-link span:hover {
            color: #d0d0d0;
        }

        .hidden {
            display: none;
        }

        .error-msg {
            color: #f56c6c;
            font-size: 12px;
            margin-top: 4px;
        }

        .history-btn {
            padding: 4px 8px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
        }

        /* 左上角菜单按钮 */
        .sidebar-toggle{
            position:fixed;
            left:0;
            top:0;
            width:64px;
            height:72px;
            border:none;
            background: #6200ee;
            color: #fff;
            font-size:24px;
            cursor:pointer;
            z-index:300;
        }

        /* 左侧折叠栏：默认隐藏 */
        .sidebar{
            position:fixed;
            left:-260px;
            top:72px;
            width:260px;
            height:calc(100vh - 72px);
            background: #1f1f1f;
            color: #e0e0e0;
            border-right:1px solid #444;
            transition:left 0.3s ease;
            z-index:200;
            padding:12px;
        }

        /* 展开时显示 */
        .sidebar.open{
            left:0;
        }

        .sidebar-content{
            padding:0;
        }

        .new-chat-card{
            padding:14px;
            border: 1px solid #444;
            border-radius:8px;
            cursor:pointer;
            margin-bottom:10px;
            background: #2a2a2a;
            color: #e0e0e0;
        }

        .new-chat-card:hover{
            background: #3b3b3b;
        }

        .history-records{
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .history-record{
            position: relative;
            padding:12px 42px 12px 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #e0e0e0;
            border-radius:8px;
            cursor:pointer;
            overflow: visible;
            display: flex;
            align-items: center;
            min-height: 48px;
        }

        /* 历史记录标题文字 */
        .history-record-title{
            flex: 1;
            overflow:hidden;
            white-space:nowrap;
            text-overflow:ellipsis;
        }

        /* 鼠标放到历史记录上时，背景提亮 */
        .history-record:hover{
            background: #3b3b3b;
        }

        /* 当前选中的历史记录 */
        .history-record.selected {
            background: #6200ee; 
            border-color: #6200ee;
            color: #fff;
        }

        /* 选中状态下 hover 仍然保持紫色，但稍微亮一点 */
        .history-record.selected:hover {
            background: #7f39fb;
            border-color: #7f39fb;
        }

        /* 历史记录右侧三个点按钮 */
        .history-more-btn{
            position:absolute;
            right:8px;
            top:50%;
            transform:translateY(-50%);
            width:26px;
            height:26px;
            border:none;
            border-radius:6px;
            background: transparent;
            color:#d0d0d0;
            cursor:pointer;
            font-size:18px;
            line-height:26px;
            opacity:0;
            transition: background 0.2s, opacity 0.2s;
        }

        /* 鼠标放到历史记录上时显示右侧按钮 */
        .history-record:hover .history-more-btn{
            opacity:1;
        }

        /* 鼠标放到右侧按钮上时，按钮提亮 */
        .history-more-btn:hover{
            background: rgba(255,255,255,0.15);
        }

        /* 当前打开菜单时，让三个点按钮保持显示 */
        .history-record.menu-open .history-more-btn{
            opacity:1;
            background: rgba(255,255,255,0.15);
        }

        /* 历史记录操作菜单 */
        .history-menu{
            position:absolute;
            right:8px;
            top:42px;
            width:118px;
            padding:6px;
            background:#2f2f2f;
            border:1px solid #444;
            border-radius:10px;
            box-shadow:0 8px 24px rgba(0,0,0,0.35);
            z-index:600;
        }

        /* 菜单里的按钮 */
        .history-menu-item{
            width:100%;
            padding:9px 10px;
            border:none;
            border-radius:8px;
            background:transparent;
            color:#e0e0e0;
            font-size:14px;
            text-align:left;
            cursor:pointer;
        }

        /* 菜单按钮 hover */
        .history-menu-item:hover{
            background:#444;
        }

        /* 删除按钮红色 */
        .history-menu-item.danger{
            color:#ff6b6b;
        }

        .history-menu-item.danger:hover{
            background:rgba(255,80,80,0.15);
        }

        /* 主页面不再因为侧边栏改变宽度 */
        .chat-container{
            left:0;
            width:100vw;
        }

        /* 隐藏AI回答气泡背景 */
        .ai-message .bubble.no-bg {
            background: none;
            border-radius: 0;
            padding: 0;
            color: #e0e0e0;
        }

        .ai-message .bubble.no-bg .markdown {
            font-size: 15px;           /* 正文字体略大 */
            line-height: 1.6;          /* 行距增大 */
            margin-bottom: 4px;
        }

        .ai-message .bubble.no-bg .markdown h3 {
            font-size: 17px;           /* 标题略大 */
            font-weight: bold;
            margin: 12px 0 6px 0;
        }

        .ai-message .bubble.no-bg .markdown ul {
            padding-left: 20px;        /* 列表缩进 */
            margin: 8px 0;
        }

        .ai-message .bubble.no-bg .markdown li {
            margin: 4px 0;
        }

        /* 百事通后缀显示在右下角，灰色小字 */
        .bubble-suffix {
            font-size: 12px;
            color: #999;
            text-align: right;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <button class="sidebar-toggle"
            onclick="toggleSidebar()">
        ☰
    </button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="new-chat-card"
                onclick="createNewChat()">
                新对话
            </div>

            <div class="history-label" style="font-size:13px;color:#999;margin:6px 0 4px 4px;">
                历史记录
            </div>

            <div id="history-list"
                class="history-records">
            </div>
        </div>
    </div>

    <div class="chat-container start-mode" id="chat-container">

        <div class="chat-header">
            <span>华南理工校园百事通</span>
            <div class="user-info">
                <span id="health-status" class="health-status">检查服务中...</span>
                <button id="login-btn" class="history-btn">登录/注册</button>
                <button id="logout-btn" class="history-btn hidden">退出登录</button>
            </div>
        </div>

        <div id="chat-messages" class="chat-messages empty"></div>

        <div class="input-area">
            <div class="option-buttons">
                <button type="button" id="deep-btn" class="option-btn" onclick="toggleDeepSearch()">深度思考</button>
                <button type="button" id="admin-btn" class="option-btn admin-hidden" onclick="toggleAdminMode()">管理员模式</button>
            </div>

            <div class="input-wrapper">
                <textarea id="question-input"
                    placeholder="你好！我是华南理工校园百事通，有任何校园问题都可以问我～"
                    onkeydown="if(event.keyCode===13&&!event.shiftKey){event.preventDefault();sendQuestion();}"></textarea>

                <button id="send-btn" onclick="sendQuestion()">发送</button>
            </div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="login-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title">用户登录</div>
            <div class="form-item">
                <label for="login-username">用户名</label>
                <input type="text" id="login-username" placeholder="3-20位英文/数字/下划线">
                <div class="error-msg" id="login-username-err"></div>
            </div>
            <div class="form-item">
                <label for="login-password">密码</label>
                <input type="password" id="login-password" placeholder="至少6位字符">
                <div class="error-msg" id="login-password-err"></div>
            </div>
            <div class="error-msg" id="login-err"></div>
            <div class="modal-btns">
                <button class="modal-btn cancel-btn" onclick="hideLoginModal()">取消</button>
                <button class="modal-btn primary-btn" onclick="doLogin()">登录</button>
            </div>

            <div class="register-link">
                <span onclick="switchToRegister()">
                    如没有账号，请先注册
                </span>
            </div>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div id="register-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title">用户注册</div>
            <div class="form-item">
                <label for="register-username">用户名</label>
                <input type="text" id="register-username" placeholder="3-20位英文/数字/下划线">
                <div class="error-msg" id="register-username-err"></div>
            </div>
            <div class="form-item">
                <label for="register-password">密码</label>
                <input type="password" id="register-password" placeholder="至少6位字符">
                <div class="error-msg" id="register-password-err"></div>
            </div>
            <div class="error-msg" id="register-err"></div>
            <div class="modal-btns">
                <button class="modal-btn cancel-btn" onclick="hideRegisterModal()">取消</button>
                <button class="modal-btn primary-btn" onclick="doRegister()">注册</button>
            </div>

            <div class="register-link login-link">
                <span onclick="switchToLogin()">
                    登录
                </span>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://backup.u850688.nyat.app:54767";
        let isRequesting = false;
        let token = localStorage.getItem("token") || "";
        let username = localStorage.getItem("username") || "";
        let isAdmin = localStorage.getItem("isAdmin") === "true" || localStorage.getItem("admin") === "true" || false;
        let conversations = [];
        let currentConversation = [];
        let currentConversationId = "";
        let openedHistoryMenuIndex = null;

        window.onload = function () {
            checkBackendHealth();
            setInterval(checkBackendHealth, 30000);

            const deepBtn = document.getElementById("deep-btn");
            const saved = localStorage.getItem("deepSearchEnabled");
            if (saved === "true") {
                deepBtn.classList.add("active");
            } else {
                deepBtn.classList.remove("active");
            }

            initUserStatus();
            renderHistoryList();

            if (token) {
                checkTokenValid();
            }
        };

        function initUserStatus() {
            const loginBtn = document.getElementById("login-btn");
            const logoutBtn = document.getElementById("logout-btn");
            const adminBtn = document.getElementById("admin-btn");

            if (token) {
                loginBtn.textContent = username || "已登录";
                logoutBtn.classList.remove("hidden");
                adminBtn.classList.toggle("admin-hidden", !isAdmin);
            } else {
                loginBtn.textContent = "登录/注册";
                logoutBtn.classList.add("hidden");
                adminBtn.classList.add("admin-hidden");
                adminBtn.classList.remove("active");
            }
        }

        async function checkTokenValid() {
            try {
                const res = await fetch(`${BASE_URL}/user/me?token=${encodeURIComponent(token)}`);
                if (!res.ok) {
                    throw new Error("Token验证接口响应失败");
                }

                const result = await res.json();

                if (result.code !== 200) {
                    clearUserInfo();
                    conversations = [];
                    initUserStatus();
                    renderHistoryList();
                    return;
                }

                username = result.data.username || username;
                isAdmin = result.data.admin || false;
                localStorage.setItem("username", username);
                localStorage.setItem("isAdmin", isAdmin);
                localStorage.setItem("admin", isAdmin);

                initUserStatus();
                await loadUserHistory();
            } catch (err) {
                console.error("Token验证失败：", err);
                clearUserInfo();
                conversations = [];
                initUserStatus();
                renderHistoryList();
            }
        }

        function clearUserInfo() {
            token = "";
            username = "";
            isAdmin = false;
            localStorage.removeItem("token");
            localStorage.removeItem("username");
            localStorage.removeItem("isAdmin");
            localStorage.removeItem("admin");
            localStorage.removeItem("deepSearchEnabled");
        }

        async function checkBackendHealth() {
            const el = document.getElementById("health-status");
            try {
                const r = await fetch(`${BASE_URL}/health`);
                if (!r.ok) {
                    el.textContent = "服务异常";
                    el.style.background = "rgba(255,70,70,0.2)";
                    return;
                }

                const j = await r.json();
                if (j.code === 200) {
                    el.textContent = "服务正常";
                    el.style.background = "rgba(0,210,110,0.2)";
                } else {
                    el.textContent = "服务异常";
                    el.style.background = "rgba(255,70,70,0.2)";
                }
            } catch (e) {
                console.error("健康检查失败：", e);
                el.textContent = "服务未启动";
                el.style.background = "rgba(255,70,70,0.2)";
            }
        }

        async function sendQuestion() {
            const input = document.getElementById("question-input");
            const btn = document.getElementById("send-btn");
            const deepBtn = document.getElementById("deep-btn");
            const adminBtn = document.getElementById("admin-btn");
            const chat = document.getElementById("chat-messages");

            const q = input.value.trim();
            if (!q || isRequesting) return;

            const chatContainer = document.getElementById("chat-container");
            if (chatContainer.classList.contains("start-mode")) {
                chatContainer.classList.remove("start-mode");
                chatContainer.classList.add("chat-active");
            }

            input.placeholder = "请输入你的问题";

            currentConversation.push({
                role: "user",
                content: q
            });

            isRequesting = true;
            btn.disabled = true;
            input.disabled = true;
            input.value = "";

            const isDeep = deepBtn.classList.contains("active");
            const isAdminMode = isAdmin && adminBtn.classList.contains("active");

            chat.innerHTML += `
            <div class="user-message message">
                <div class="bubble">${escapeHtml(q)}</div>
            </div>`;

            const loadingId = "loading-" + Date.now();
            let loadingText = isDeep ? "深度思考中......" : "AI 思考中......";
            if (isAdminMode) loadingText = "管理员模式 - " + loadingText;
            chat.innerHTML += `<div id="${loadingId}" class="loading">${loadingText}</div>`;
            scrollChatToBottom();

            try {
                const params = new URLSearchParams();
                params.set("question", q);
                if (isDeep) params.set("deep", "true");
                if (isAdminMode) params.set("admin", "true");
                if (token) params.set("token", token);

                // 登录用户继续已有对话档案时才传 conversationId；新对话不传，让后端自动创建。
                // 管理员模式按后端说明暂不接入 conversation_message，所以不传 conversationId。
                if (token && currentConversationId && !isAdminMode) {
                    params.set("conversationId", currentConversationId);
                }

                const ctrl = new AbortController();
                const timer = setTimeout(() => ctrl.abort(), 15000);
                const res = await fetch(`${BASE_URL}/question/ask?${params.toString()}`, {
                    signal: ctrl.signal,
                    method: "GET",
                    headers: {
                        "Accept": "application/json"
                    }
                });
                clearTimeout(timer);

                if (!res.ok) {
                    throw new Error(`请求失败：${res.status} ${res.statusText}`);
                }

                const result = await res.json();

                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                let answer = "";

                if (result.code === 200) {
                if (result.data && typeof result.data === "object") {
                    answer = result.data.answer || "暂无相关回答，可简化问题重试";

                    if (token && !isAdminMode && result.data.conversationId) {
                        const isFirstBackendConversationId = !currentConversationId;
                        currentConversationId = result.data.conversationId;

                        if (isFirstBackendConversationId) {
                            await updateConversationTitle(currentConversationId, q);
                        }
                    }
                } else {
                    answer = result.data || "暂无相关回答，可简化问题重试";
                }
            } else {
                answer = result.msg || "请求失败，请重试";
            }

                const ans = formatAnswerWithSuffix(answer);

                chat.innerHTML += `
                    <div class="ai-message message">
                        <div class="bubble no-bg">
                            ${renderMarkdownToHtml(ans.text)}
                            ${ans.suffix ? `<div class="bubble-suffix">${escapeHtml(ans.suffix)}</div>` : ""}
                        </div>
                    </div>`;

                currentConversation.push({
                    role: "assistant",
                    content: String(answer)
                });

                if (token) {
                    await loadUserHistory();
                }

            } catch (err) {
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                const msg = err.name === "AbortError"
                    ? "请求超时（管理员模式处理可能需要更长时间），请重试"
                    : `请求失败：${err.message}`;

                chat.innerHTML += `
                <div class="ai-message message">
                    <div class="bubble" style="color:#f56c6c">${escapeHtml(msg)}</div>
                </div>`;
                console.error("发送问题失败：", err);
            } finally {
                isRequesting = false;
                btn.disabled = false;
                input.disabled = false;
                input.focus();
                scrollChatToBottom();
            }
        }

        function showLoginModal() {
            document.getElementById("login-modal").classList.remove("hidden");
        }

        function hideLoginModal() {
            document.getElementById("login-modal").classList.add("hidden");
            clearLoginErrors();
        }

        function clearLoginErrors() {
            document.getElementById("login-username-err").textContent = "";
            document.getElementById("login-password-err").textContent = "";
            document.getElementById("login-err").textContent = "";
        }

        function showRegisterModal() {
            document.getElementById("register-modal").classList.remove("hidden");
        }

        function hideRegisterModal() {
            document.getElementById("register-modal").classList.add("hidden");
            clearRegisterErrors();
        }

        function clearRegisterErrors() {
            document.getElementById("register-username-err").textContent = "";
            document.getElementById("register-password-err").textContent = "";
            document.getElementById("register-err").textContent = "";
        }

        function switchToRegister() {
            hideLoginModal();
            showRegisterModal();
        }

        function switchToLogin() {
            hideRegisterModal();
            showLoginModal();
        }

        async function doLogin() {
            const usernameEl = document.getElementById("login-username");
            const passwordEl = document.getElementById("login-password");
            const usernameVal = usernameEl.value.trim();
            const passwordVal = passwordEl.value.trim();
            let hasError = false;

            clearLoginErrors();
            const usernameReg = /^[a-zA-Z0-9_]{3,20}$/;
            if (!usernameVal) {
                document.getElementById("login-username-err").textContent = "请输入用户名";
                hasError = true;
            } else if (!usernameReg.test(usernameVal)) {
                document.getElementById("login-username-err").textContent = "用户名只能包含英文、数字、下划线，长度3-20位";
                hasError = true;
            }
            if (!passwordVal) {
                document.getElementById("login-password-err").textContent = "请输入密码";
                hasError = true;
            } else if (passwordVal.length < 6) {
                document.getElementById("login-password-err").textContent = "密码长度至少6位";
                hasError = true;
            }
            if (hasError) return;

            try {
                const res = await fetch(`${BASE_URL}/user/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify({
                        username: usernameVal,
                        password: passwordVal
                    })
                });

                if (!res.ok) {
                    throw new Error(`登录接口响应失败：${res.status}`);
                }

                const result = await res.json();

                if (result.code === 200) {
                    token = result.data.token || "";
                    username = result.data.username || "";
                    isAdmin = result.data.admin || false;

                    localStorage.setItem("token", token);
                    localStorage.setItem("username", username);
                    localStorage.setItem("isAdmin", isAdmin);
                    localStorage.setItem("admin", isAdmin);

                    conversations = [];
                    currentConversation = [];
                    currentConversationId = "";

                    hideLoginModal();
                    initUserStatus();
                    await loadUserHistory();
                    alert("登录成功！");
                } else {
                    document.getElementById("login-err").textContent =
                        result.msg || "登录失败，请重试";
                }
            } catch (err) {
                console.error("登录请求失败：", err);
                document.getElementById("login-err").textContent = "网络异常或服务未响应，请重试";
            }
        }

            const passwordVal = passwordEl.value.trim();

        function logout() {
            clearUserInfo();
            conversations = [];
            currentConversation = [];
            currentConversationId = "";
            initUserStatus();
            renderHistoryList();
            createNewChat();
            alert("已退出登录");
        }

        function createNewChat(){
            closeHistoryMenus();

            currentConversation = [];
            currentConversationId = "";

            document
                .getElementById("chat-container")
                .classList
                .remove("chat-active");

            document
                .getElementById("chat-container")
                .classList
                .add("start-mode");

            document.getElementById("chat-messages").innerHTML = "";

            const input = document.getElementById("question-input");
            input.value = "";
            input.placeholder = "你好！我是华南理工校园百事通，有任何校园问题都可以问我～";
            input.focus();

            if (token) {
                loadUserHistory();
            }
        }

        document.getElementById("login-btn").addEventListener("click", function() {
            if (!token) {
                showLoginModal();
            } else {
                alert(`当前登录账号：${username}`);
            }
        });

        document.getElementById("logout-btn").addEventListener("click", logout);

        function toggleSidebar(){
            document
                .getElementById("sidebar")
                .classList
                .toggle("open");
        }

        document.addEventListener("click", function(event) {
            // 点击菜单本身或三个点按钮时，不关闭菜单
            if (
                event.target.closest(".history-menu") ||
                event.target.closest(".history-more-btn")
            ) {
                return;
            }

            closeHistoryMenus();
        });

        function renderHistoryList(){
            const list = document.getElementById("history-list");
            list.innerHTML = "";

            if(!token) return;

            conversations.forEach((item,index)=>{
                const div = document.createElement("div");
                div.className = "history-record";

                // 如果这条历史记录就是当前打开的对话，则保持紫色选中状态
                if (item.conversationId && item.conversationId === currentConversationId) {
                    div.classList.add("selected");
                }

                // 点击整条历史记录，打开该对话
                div.onclick = () => openConversation(index);

                // 历史记录标题文字
                const titleSpan = document.createElement("span");
                titleSpan.className = "history-record-title";
                titleSpan.innerText = item.title || "新对话";

                // 右侧三个点按钮
                const moreBtn = document.createElement("button");
                moreBtn.type = "button";
                moreBtn.className = "history-more-btn";
                moreBtn.innerHTML = "⋯";
                moreBtn.title = "更多操作";

                // 点击三个点按钮时，不触发打开对话
                moreBtn.onclick = (event) => {
                    event.stopPropagation();
                    toggleHistoryMenu(index, div);
                };

                div.appendChild(titleSpan);
                div.appendChild(moreBtn);

                list.appendChild(div);
            });
        }

        function closeHistoryMenus() {
            openedHistoryMenuIndex = null;

            document.querySelectorAll(".history-menu").forEach(menu => {
                menu.remove();
            });

            document.querySelectorAll(".history-record.menu-open").forEach(record => {
                record.classList.remove("menu-open");
            });
        }

        function toggleHistoryMenu(index, recordEl) {
            // 如果当前点的是已经打开的菜单，则关闭
            if (openedHistoryMenuIndex === index) {
                closeHistoryMenus();
                return;
            }

            closeHistoryMenus();

            openedHistoryMenuIndex = index;
            recordEl.classList.add("menu-open");

            const menu = document.createElement("div");
            menu.className = "history-menu";

            // 防止点击菜单时触发打开对话
            menu.onclick = (event) => {
                event.stopPropagation();
            };

            const renameBtn = document.createElement("button");
            renameBtn.type = "button";
            renameBtn.className = "history-menu-item";
            renameBtn.innerText = "重命名";
            renameBtn.onclick = (event) => {
                event.stopPropagation();
                renameHistoryConversation(index);
            };

            const deleteBtn = document.createElement("button");
            deleteBtn.type = "button";
            deleteBtn.className = "history-menu-item danger";
            deleteBtn.innerText = "删除";
            deleteBtn.onclick = (event) => {
                event.stopPropagation();
                deleteHistoryConversation(index);
            };

            menu.appendChild(renameBtn);
            menu.appendChild(deleteBtn);

            recordEl.appendChild(menu);
        }

        async function renameHistoryConversation(index) {
            const data = conversations[index];

            if (!token) {
                alert("请先登录");
                return;
            }

            if (!data || !data.conversationId) {
                alert("未找到该历史记录");
                return;
            }

            const oldTitle = data.title || "新对话";
            const newTitle = prompt("请输入新的对话标题", oldTitle);

            // 用户点取消
            if (newTitle === null) {
                closeHistoryMenus();
                return;
            }

            const title = newTitle.trim();

            if (!title) {
                alert("标题不能为空");
                return;
            }

            try {
                const params = new URLSearchParams();
                params.set("token", token);
                params.set("conversationId", data.conversationId);
                params.set("title", title);

                const res = await fetch(`${BASE_URL}/conversation/title?${params.toString()}`, {
                    method: "POST"
                });

                if (!res.ok) {
                    throw new Error(`重命名接口响应失败：${res.status}`);
                }

                const result = await res.json();

                if (result.code !== 200) {
                    alert(result.msg || "重命名失败");
                    return;
                }

                closeHistoryMenus();

                // 更新本地标题，避免界面延迟
                data.title = title;

                // 重新拉取历史列表，保证和后端一致
                await loadUserHistory();

            } catch (err) {
                console.error("重命名历史记录失败：", err);
                alert("重命名失败，请稍后重试");
            }
        }

        async function deleteHistoryConversation(index) {
            const data = conversations[index];

            if (!token) {
                alert("请先登录");
                return;
            }

            if (!data || !data.conversationId) {
                alert("未找到该历史记录");
                return;
            }

            const ok = confirm(`确定要删除「${data.title || "新对话"}」吗？`);

            if (!ok) {
                closeHistoryMenus();
                return;
            }

            try {
                const params = new URLSearchParams();
                params.set("token", token);
                params.set("conversationId", data.conversationId);

                const res = await fetch(`${BASE_URL}/conversation/archive?${params.toString()}`, {
                    method: "POST"
                });

                if (!res.ok) {
                    throw new Error(`删除接口响应失败：${res.status}`);
                }

                const result = await res.json();

                if (result.code !== 200) {
                    alert(result.msg || "删除失败");
                    return;
                }

                closeHistoryMenus();

                // 如果删除的是当前正在打开的对话，则回到新对话页面
                if (currentConversationId === data.conversationId) {
                    currentConversation = [];
                    currentConversationId = "";

                    document
                        .getElementById("chat-container")
                        .classList
                        .remove("chat-active");

                    document
                        .getElementById("chat-container")
                        .classList
                        .add("start-mode");

                    document.getElementById("chat-messages").innerHTML = "";

                    const input = document.getElementById("question-input");
                    input.value = "";
                    input.placeholder = "你好！我是华南理工校园百事通，有任何校园问题都可以问我～";
                    input.focus();
                }

                // 重新加载历史记录，删除后的记录不会再显示
                await loadUserHistory();

            } catch (err) {
                console.error("删除历史记录失败：", err);
                alert("删除失败，请稍后重试");
            }
        }

        async function loadUserHistory() {
            if (!token) {
                conversations = [];
                renderHistoryList();
                return;
            }

            try {
                const res = await fetch(`${BASE_URL}/conversation/list?token=${encodeURIComponent(token)}`);
                if (!res.ok) {
                    throw new Error(`历史记录接口响应失败：${res.status}`);
                }

                const result = await res.json();

                if (result.code === 200 && Array.isArray(result.data)) {
                    conversations = result.data.map(item => ({
                        id: item.conversationId,
                        conversationId: item.conversationId,
                        title: item.title || "新对话",
                        messages: []
                    }));
                } else {
                    conversations = [];
                    console.error("读取历史记录失败：", result.msg);
                }

                renderHistoryList();
            } catch (err) {
                console.error("读取历史记录失败：", err);
            }
        }

        async function openConversation(index){
            if(!token){
                alert("请先登录");
                return;
            }

            closeHistoryMenus();

            const data = conversations[index];
            if (!data || !data.conversationId) return;

            const historyList = document.getElementById("history-list");
            Array.from(historyList.children).forEach((div, idx) => {
                if (idx === index) {
                    div.classList.add("selected");
                } else {
                    div.classList.remove("selected");
                }
            });

            try {
                const res = await fetch(
                    `${BASE_URL}/conversation/messages?token=${encodeURIComponent(token)}&conversationId=${encodeURIComponent(data.conversationId)}`
                );

                if (!res.ok) {
                    throw new Error(`历史详情接口响应失败：${res.status}`);
                }

                const result = await res.json();

                if (result.code !== 200 || !Array.isArray(result.data)) {
                    alert(result.msg || "读取历史对话失败");
                    return;
                }

                const chat = document.getElementById("chat-messages");
                chat.innerHTML = "";

                currentConversation = result.data.map(msg => {
                    const role = msg.role === "USER" ? "user" : "assistant";
                    const content = msg.content || "";

                    if(role === "user"){
                        chat.innerHTML += `
                        <div class="user-message message">
                            <div class="bubble">${escapeHtml(content)}</div>
                        </div>`;
                    } else {
                        const ans = formatAnswerWithSuffix(content);
                        chat.innerHTML += `
                        <div class="ai-message message">
                            <div class="bubble no-bg">
                                ${renderMarkdownToHtml(ans.text)}
                                ${ans.suffix ? `<div class="bubble-suffix">${escapeHtml(ans.suffix)}</div>` : ""}
                            </div>
                        </div>`;
                    }

                    return { role, content };
                });

                currentConversationId = data.conversationId;

                document
                    .getElementById("chat-container")
                    .classList
                    .remove("start-mode");

                document
                    .getElementById("chat-container")
                    .classList
                    .add("chat-active");

                document.getElementById("question-input").placeholder = "请输入你的问题";
                scrollChatToBottom();

            } catch(err) {
                console.error("拉取对话档案失败：", err);
                alert("读取历史对话失败，请稍后重试");
            }
        }

        async function updateConversationTitle(conversationId, title) {
            if (!token || !conversationId || !title) return;

            try {
                const params = new URLSearchParams();
                params.set("token", token);
                params.set("conversationId", conversationId);
                params.set("title", title);

                const res = await fetch(`${BASE_URL}/conversation/title?${params.toString()}`, {
                    method: "POST"
                });

                const result = await res.json();
                if (result.code !== 200) {
                    console.error("修改对话标题失败：", result.msg);
                }
            } catch (err) {
                console.error("修改对话标题失败：", err);
            }
        }

        function scrollChatToBottom() {
            const chat = document.getElementById("chat-messages");
            setTimeout(() => {
                chat.scrollTop = chat.scrollHeight;
            }, 50);
        }

        function formatAnswerWithSuffix(answerText) {
            const suffixes = [
                "（知识库信息）",
                "【提示：数据库中没有相关内容，此内容为 AI 自动生成。】",
                "(来自当前对话上传文件)",
                "(来自用户全局知识库)"
            ];

            let mainText = String(answerText || "");
            let detectedSuffix = "";

            for (const s of suffixes) {
                if (mainText.endsWith(s)) {
                    mainText = mainText.slice(0, -s.length).trim();
                    detectedSuffix = s;
                    break;
                }
            }

            return {
                text: mainText,
                suffix: detectedSuffix
            };
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function toggleDeepSearch() {
            const deepBtn = document.getElementById("deep-btn");
            deepBtn.classList.toggle("active");
            localStorage.setItem(
                "deepSearchEnabled",
                deepBtn.classList.contains("active")
            );
        }

        function toggleAdminMode() {
            if (!isAdmin) return;

            const adminBtn = document.getElementById("admin-btn");
            adminBtn.classList.toggle("active");
        }

        function renderMarkdownToHtml(mdText) {
            if (!mdText) return "";

            let html = mdText
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            // 加粗 **
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // 斜体 *
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // 无序列表 - 
            html = html.replace(/^\s*-\s(.+)$/gm, '<li>$1</li>');
            if (html.includes('<li>')) {
                html = '<ul>' + html + '</ul>';
            }

            // 一级标题 #
            html = html.replace(/^#\s+(.+)$/gm, '<h3>$1</h3>');

            return `<div class="markdown">${html}</div>`;
        }
    </script>
